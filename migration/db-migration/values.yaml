# Default values for Cassandra/PostgreSQL migration Helm chart

# ============================
# Environment
# ============================
global:
  env: "sb"   # Environment prefix used in keyspace names (e.g. sb_content_store)

# ============================
# Jobs Configuration - Enable/Disable each migration type
# ============================
jobs:
  # Cassandra to YugabyteDB migration
  cassandra:
    enabled: false
    name: cassandra-migration-job


  # PostgreSQL to YugabyteDB migration (SQL dump/restore)
  postgres:
    enabled: false
    name: postgres-migration-job

  # Neo4j to JanusGraph migration (Graph to Graph)
  neo4j:
    enabled: false
    name: neo4j-janusgraph-migration-job

  # createdat backfill migration
  createdat:
    enabled: false
    name: createdat-migration-job

  # Elasticsearch old-to-new cluster migration
  elasticsearch:
    enabled: false
    name: elasticsearch-migration-job

  # Keycloak password hash + client secret update
  keycloak:
    enabled: false
    name: keycloak-migration-job

  # content_hierarchy identifier fix (strip .img + retrigger hierarchy update)
  fixHierarchyIdentifiers:
    enabled: false
    name: fix-hierarchy-identifiers-job


# ============================
# Cassandra Source Configuration (Reads FROM this host)
# ============================
cassandra:
  host: ""          # External IP of the source Cassandra LoadBalancer (e.g. 20.207.92.174)
  port: 9042
  serviceType: "LoadBalancer"  # External LoadBalancer IP

  # Migration settings
  keyspaces:
    - sunbird
    - sb_content_store
    - sunbird_courses
    - sb_hierarchy_store
    - qmzbm_form_service
    - sunbird_notifications
    - sb_category_store
    - dialcodes
    - sb_dialcode_store
    - sb_question_store
    - apzvp_review_comment
  tables: []
  username: null
  password: null

# ============================
# Neo4j Source Configuration
# ============================
neo4j:
  host: ""          # External IP of the source Neo4j instance (e.g. 20.207.70.157)
  port: 7687
  database: "neo4j"
  username: "neo4j"
  password: ""
  nodeLabels: []
  relationships: []

# ============================
# JanusGraph Target Configuration
# ============================
janusgraph:
  namespace: "sunbird"
  service: "janusgraph"
  port: 8182
  # Label selector used to find the JanusGraph pod for kubectl exec
  podLabel: "app.kubernetes.io/name=janusgraph"
  # Container name inside the pod (pod has 2 containers — target the janusgraph one)
  container: "janusgraph"

# ============================
# PostgreSQL Source Configuration
# ============================
postgres:
  host: ""          # External IP of the source PostgreSQL LoadBalancer (e.g. 20.204.200.23)
  port: 5432
  databases:
    - keycloak
    - registry
  serviceType: "LoadBalancer"
  schemas:
    - public
  tables: []
  username: "postgres"
  password: ""      # Source PostgreSQL password

# ============================
# Keycloak Migration Configuration
# ============================
keycloak:
  username: "admin"
  password: ""      # New Keycloak admin password to set
  newSecret: ""     # New client secret suffix to replace across all clients

# ============================
# YugabyteDB Target Configuration
# ============================
yugabyte:
  host: "yb-tserver-service.sunbird.svc.cluster.local"
  port: 9042
  sqlPort: 5433
  database: "yugabyte"
  username: "yugabyte"
  password: ""

# ============================
# Kubernetes Job Configuration
# ============================
job:
  namespace: sunbird

  # Number of retries if job fails
  backoffLimit: 3

  # Keep job logs for this many seconds (7 days)
  ttlSecondsAfterFinished: 604800

  # Image for running migration
  image:
    repository: eclipse-temurin
    tag: "17-jdk"
    pullPolicy: IfNotPresent

# ============================
# Resource configuration
# ============================
resources:
  requests:
    memory: "4Gi"
    cpu: "2"
  limits:
    memory: "8Gi"
    cpu: "4"

# ============================
# Service Account
# ============================
serviceAccount:
  create: true
  name: migration-sa

# ============================
# ConfigMap for scripts
# ============================
configMap:
  name: migration-scripts
  # Scripts will be mounted from files/
  scriptFiles:
    - cassandra_to_yugabyte.py
    - postgres_dump_restore.sh
    - neo4j_to_janusgraph.py
    - add_user_createdat_field.py
    - migrate_elasticsearch.py
    - generate_hierarchy_relations.py

# ============================
# Volume configuration
# ============================
volumes:
  logs:
    sizeLimit: "1Gi"
    medium: "Memory"

# ============================
# Elasticsearch Migration Configuration
# ============================
elasticsearchMigration:
  oldEsHost: ""     # External IP of the source Elasticsearch (e.g. http://98.70.233.211:9200)
  newEsHost: "http://elasticsearch.sunbird.svc.cluster.local:9200"
  oldEsUser: ""
  oldEsPassword: ""
  indices: ""          # comma-separated, leave empty for all indices
  batchSize: 1000
  skipIndices: ""      # comma-separated indices to skip

# ============================
# createdat Backfill Configuration
# ============================
createdat:
  esHost: "elasticsearch"
  esPort: 9200
  ybPod: "yb-tserver-0"
  ybNamespace: "sunbird"
  lernNamespace: "sunbird"
  lernPort: "9000"
  keyspace: "sunbird"
  syncBatchSize: 500

# ============================
# content_hierarchy identifier fix
# ============================
fixHierarchyIdentifiers:
  ybPod: "yb-tserver-0"
  ybNamespace: "sunbird"
  # keyspace is derived from global.env in the job template:
  #   "{{ .Values.global.env }}_hierarchy_store"  →  e.g. "sb_hierarchy_store"
  table: "content_hierarchy"
  # knowlg-service is reachable via cluster DNS from inside the job pod;
  # no port-forward needed when the job runs in-cluster.
  knowlgServiceHost: "knowlg-service.sunbird.svc.cluster.local"
  knowlgServicePort: "9000"
  apiDelaySeconds: "0.1"
  apiTimeoutSeconds: "30"
  progressEvery: "100"
  dryRun: "false"

# ============================
# Logging
# ============================
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(message)s"

# ============================
