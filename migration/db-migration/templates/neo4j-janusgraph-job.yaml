{{- if .Values.jobs.neo4j.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.jobs.neo4j.name }}
  namespace: {{ .Values.job.namespace }}
  labels:
    app: migration
    type: neo4j-janusgraph
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: migration
        type: neo4j-janusgraph
        release: {{ .Release.Name }}
    spec:
      restartPolicy: Never

      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- else }}
      serviceAccountName: default
      {{- end }}

      containers:
      - name: neo4j-janusgraph-migration
        image: "python:3.11-slim"
        imagePullPolicy: IfNotPresent

        # Install neo4j driver + pyspark + kubectl, then run Python migration script
        command:
        - /bin/bash
        - -c
        - |
          apt-get update -qq && apt-get install -y -qq curl &&
          pip install -q neo4j==1.7.6 &&
          curl -sSL "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl" -o /tmp/kubectl &&
          chmod +x /tmp/kubectl && mv /tmp/kubectl /usr/local/bin/kubectl &&
          python3 /scripts/neo4j_to_janusgraph.py

        env:
        - name: LOG_LEVEL
          value: "{{ .Values.logging.level }}"
        - name: MIGRATION_TYPE
          value: "neo4j-janusgraph"
        - name: PYSPARK_PYTHON
          value: "python3"

        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"

        volumeMounts:
        - name: script-volume
          mountPath: /scripts
          readOnly: true
        - name: logs-volume
          mountPath: /var/log/migration

      terminationGracePeriodSeconds: 3600

      volumes:
      - name: script-volume
        configMap:
          name: {{ .Values.configMap.name }}
          defaultMode: 0755
          optional: false
      - name: logs-volume
        emptyDir:
          medium: {{ .Values.volumes.logs.medium | quote }}
          sizeLimit: {{ .Values.volumes.logs.sizeLimit }}
{{- end }}
