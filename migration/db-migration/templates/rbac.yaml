{{- if .Values.serviceAccount.create }}
# Role: allows the migration job to find and exec into the JanusGraph pod
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migration-pod-exec
  namespace: {{ .Values.job.namespace }}
  labels:
    app: migration
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migration-pod-exec
  namespace: {{ .Values.job.namespace }}
  labels:
    app: migration
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: migration-pod-exec
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.job.namespace }}
{{- end }}
