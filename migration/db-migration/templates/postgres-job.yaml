{{- if .Values.jobs.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.jobs.postgres.name }}
  namespace: {{ .Values.job.namespace }}
  labels:
    app: migration
    type: postgres
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  # Number of times to retry if job fails
  backoffLimit: {{ .Values.job.backoffLimit }}

  # Keep job history after completion (7 days = 604800 seconds)
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}

  # How many completions needed (1 = run once)
  completions: 1

  # How many pods can run in parallel
  parallelism: 1

  # Pod template
  template:
    metadata:
      labels:
        app: migration
        type: postgres
        release: {{ .Release.Name }}
    spec:
      # Don't restart pod when job finishes
      restartPolicy: Never

      # Service account
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- else }}
      serviceAccountName: default
      {{- end }}

      # Containers to run
      containers:
      - name: postgres-migration
        # Image with PostgreSQL client tools
        image: "postgres:14"
        imagePullPolicy: IfNotPresent

        # Command to execute
        command:
        - /bin/bash
        - /scripts/postgres_dump_restore.sh

        # Environment variables
        env:
        - name: LOG_LEVEL
          value: "{{ .Values.logging.level }}"

        - name: MIGRATION_TYPE
          value: "postgres-dump"

        # Resource limits
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"

        # Mount volumes
        volumeMounts:
        - name: script-volume
          mountPath: /scripts
          readOnly: true

        - name: logs-volume
          mountPath: /var/log/migration

      # Timeout
      terminationGracePeriodSeconds: 3600

      # Define volumes
      volumes:
      - name: script-volume
        configMap:
          name: {{ .Values.configMap.name }}
          defaultMode: 0755
          optional: false

      - name: logs-volume
        emptyDir:
          medium: {{ .Values.volumes.logs.medium | quote }}
          sizeLimit: {{ .Values.volumes.logs.sizeLimit }}
{{- end }}
