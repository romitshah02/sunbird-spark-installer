apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMap.name }}
  namespace: {{ .Values.job.namespace }}
  labels:
    app: migration
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  # Cassandra to YugabyteDB migration script (PySpark)
  cassandra_to_yugabyte.py: |
{{ tpl (.Files.Get "files/cassandra_to_yugabyte.py") . | indent 4 }}

  # PostgreSQL to YugabyteDB migration script (SQL dump/restore)
  postgres_dump_restore.sh: |
{{ tpl (.Files.Get "files/postgres_dump_restore.sh") . | indent 4 }}

  # Neo4j to JanusGraph migration script (Python — exports CSV, kubectl exec)
  neo4j_to_janusgraph.py: |
{{ tpl (.Files.Get "files/neo4j_to_janusgraph.py") . | indent 4 }}

  # Groovy script that runs inside JanusGraph pod to import nodes/edges
  # (does NOT drop existing data — skips vertices that already exist)
  import_data.groovy: |
{{ .Files.Get "files/import_data.groovy" | indent 4 }}

  # Groovy script that runs inside JanusGraph pod to verify counts
  verify_migration.groovy: |
{{ .Files.Get "files/verify_migration.groovy" | indent 4 }}

  # Groovy script to set graphId=domain for all migrated vertices
  set_graphid.groovy: |
{{ .Files.Get "files/set_graphid.groovy" | indent 4 }}

  # createdat backfill migration script
  add_user_createdat_field.py: |
{{ .Files.Get "files/add_user_createdat_field.py" | indent 4 }}

  # Elasticsearch old-to-new cluster migration script
  migrate_elasticsearch.py: |
{{ .Files.Get "files/migrate_elasticsearch.py" | indent 4 }}

  # Keycloak password hash + client secret update script
  update_keycloak_credentials.py: |
{{ .Files.Get "files/update_keycloak_credentials.py" | indent 4 }}

  # content_hierarchy identifier fix (strip .img + trigger update-relation API)
  generate_hierarchy_relations.py: |
{{ .Files.Get "files/generate_hierarchy_relations.py" | indent 4 }}
