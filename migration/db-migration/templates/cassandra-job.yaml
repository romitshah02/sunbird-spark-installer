{{- if .Values.jobs.cassandra.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.jobs.cassandra.name }}
  namespace: {{ .Values.job.namespace }}
  labels:
    app: migration
    type: cassandra
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  # Number of times to retry if job fails
  backoffLimit: {{ .Values.job.backoffLimit }}

  # Keep job history after completion (7 days = 604800 seconds)
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}

  # How many completions needed (1 = run once)
  completions: 1

  # How many pods can run in parallel
  parallelism: 1

  # Pod template
  template:
    metadata:
      labels:
        app: migration
        type: cassandra
        release: {{ .Release.Name }}
    spec:
      # Don't restart pod when job finishes
      restartPolicy: Never

      # Service account
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- else }}
      serviceAccountName: default
      {{- end }}

      # Containers to run
      containers:
      - name: cassandra-migration
        # PySpark image
        image: "{{ .Values.job.image.repository }}:{{ .Values.job.image.tag }}"
        imagePullPolicy: {{ .Values.job.image.pullPolicy }}

        # Command to execute
        command:
        - /bin/bash
        - -c
        - |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip >/dev/null 2>&1 &&
          pip3 install --break-system-packages -q pyspark==3.5.0 cassandra-driver &&
          spark-submit --packages com.datastax.spark:spark-cassandra-connector_2.12:3.4.1 /scripts/cassandra_to_yugabyte.py

        # Environment variables
        env:
        - name: LOG_LEVEL
          value: "{{ .Values.logging.level }}"

        - name: MIGRATION_TYPE
          value: "cassandra"

        - name: ENV
          value: "{{ .Values.global.env | default "sb" }}"

        # Resource limits
        resources:
          requests:
            memory: "{{ .Values.resources.requests.memory }}"
            cpu: "{{ .Values.resources.requests.cpu }}"
          limits:
            memory: "{{ .Values.resources.limits.memory }}"
            cpu: "{{ .Values.resources.limits.cpu }}"

        # Mount volumes
        volumeMounts:
        - name: script-volume
          mountPath: /scripts
          readOnly: true

        - name: logs-volume
          mountPath: /var/log/migration

      # Timeout
      terminationGracePeriodSeconds: 3600

      # Define volumes
      volumes:
      - name: script-volume
        configMap:
          name: {{ .Values.configMap.name }}
          defaultMode: 0755
          optional: false

      - name: logs-volume
        emptyDir:
          medium: {{ .Values.volumes.logs.medium | quote }}
          sizeLimit: {{ .Values.volumes.logs.sizeLimit }}
{{- end }}
