{{- if .Values.postMigration.createdatBackfill.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "database-import.fullname" . }}-createdat
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database-import.labels" . | nindent 4 }}
    app.kubernetes.io/component: createdat-backfill
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "6"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "database-import.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: createdat-backfill
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "database-import.serviceAccountName" . }}
      containers:
      - name: createdat-backfill
        image: {{ .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        command: ["/bin/bash"]
        args: ["/scripts/createdat-backfill.sh"]
        env:
        - name: ES_SERVICE
          value: "{{ .Values.databases.elasticsearch.host }}:{{ .Values.databases.elasticsearch.port }}"
        - name: YB_POD
          value: {{ .Values.postMigration.createdatBackfill.ybPod | quote }}
        - name: NAMESPACE
          value: {{ .Values.target.namespace | default "sunbird" | quote }}
        - name: KEYSPACE
          value: {{ .Values.postMigration.createdatBackfill.keyspace | quote }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: temp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.jobs.resources | nindent 12 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "database-import.scriptsConfigMap" . }}
          defaultMode: 0755
      - name: temp
        emptyDir: {}
{{- end }}
