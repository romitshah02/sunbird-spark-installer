{{- if .Values.postMigration.hierarchyFix.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "database-import.fullname" . }}-hierarchy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database-import.labels" . | nindent 4 }}
    app.kubernetes.io/component: hierarchy-fix
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "7"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "database-import.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hierarchy-fix
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "database-import.serviceAccountName" . }}
      containers:
      - name: hierarchy-fix
        image: {{ .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        command: ["/bin/bash"]
        args: ["/scripts/hierarchy-fix.sh"]
        env:
        - name: YB_POD
          value: {{ .Values.postMigration.hierarchyFix.ybPod | quote }}
        - name: YB_NAMESPACE
          value: {{ .Values.target.namespace | default "sunbird" | quote }}
        - name: KEYSPACE
          value: "{{ .Values.databases.ycql.targetPrefix | default "sb_" }}hierarchy_store"
        - name: KNOWLG_SERVICE_HOST
          value: {{ .Values.postMigration.hierarchyFix.knowlgServiceHost | quote }}
        - name: KNOWLG_SERVICE_PORT
          value: {{ .Values.postMigration.hierarchyFix.knowlgServicePort | quote }}
        - name: DRY_RUN
          value: {{ .Values.postMigration.hierarchyFix.dryRun | quote }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: temp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.jobs.resources | nindent 12 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "database-import.scriptsConfigMap" . }}
          defaultMode: 0755
      - name: temp
        emptyDir: {}
{{- end }}
