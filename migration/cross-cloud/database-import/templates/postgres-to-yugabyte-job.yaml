{{- if .Values.databases.yugabytedb.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "database-import.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database-import.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-restore
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "database-import.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-restore
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "database-import.serviceAccountName" . }}
      containers:
      - name: postgres-restore
        image: {{ .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        command: ["/bin/bash"]
        args: ["/scripts/postgres-to-yugabyte.sh"]
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.databases.yugabytedb.host | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.databases.yugabytedb.port | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.databases.yugabytedb.username | default "yugabyte" | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.databases.yugabytedb.password | default "" | quote }}
        - name: STORAGE_TYPE
          value: {{ .Values.target.cloud | quote }}
        - name: STORAGE_CONTAINER
          value: {{ .Values.target.container | quote }}
        - name: AZURE_STORAGE_ACCOUNT
          value: {{ .Values.target.storageAccount | quote }}
        - name: AZURE_STORAGE_KEY
          value: {{ .Values.target.accessKey | quote }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: temp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.jobs.resources | nindent 12 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "database-import.scriptsConfigMap" . }}
          defaultMode: 0755
      - name: temp
        emptyDir: {}
{{- end }}
