# =============================================================================
# database-import: Phase 2 of cross-cloud migration
# Restores artifacts from object storage into Sunbird Spark target cluster
# =============================================================================

# Name overrides (optional)
nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# Object storage source (artifacts produced by database-export)
# -----------------------------------------------------------------------------
target:
  cloud: "azure"                     # azure | gcp | aws | onprem
  namespace: "sunbird"               # Namespace of target DB pods (kubectl-exec target)
  useExistingSecrets: true           # true = use existing cluster secrets; false = create secret from values
  container: ""           # Container name for kubectl exec (if multiple containers in pod)s
  # Azure Blob
  storageAccount: ""
  accessKey: ""

  # GCP
  bucket: ""
  projectId: ""
  serviceAccountKey: ""

  # AWS
  s3Bucket: ""
  accessKeyId: ""
  secretAccessKey: ""
  region: ""

  # Storage path prefixes (must match source paths when same-cloud; can differ when rclone'd)
  postgresql_path: "postgresql"
  cassandra_path: "cassandra"
  elasticsearch_path: "cluster-1"
  neo4j_path: "neo4j"

# -----------------------------------------------------------------------------
# Target databases (Sunbird Spark)
# -----------------------------------------------------------------------------
databases:
  ysql:
    enabled: false
    host: "yb-tserver-service.sunbird.svc.cluster.local"
    port: 5433
    username: "yugabyte"
    password: ""
    databases:
      - name: "keycloak"
        username: "yugabyte"
        password: ""
      - name: "registry"
        username: "yugabyte"
        password: ""

  ycql:
    enabled: false
    image: "python:3.11"
    host: "yb-tserver-service.sunbird.svc.cluster.local"
    port: 9042
    username: "cassandra"
    password: ""
    # Keyspace prefix rename at restore. Set both to "" to disable.
    # Example: "sb_content_store" → "dv_content_store" when sourcePrefix="sb_", targetPrefix="dv_"
    sourcePrefix: "sb_"
    targetPrefix: "dv_"
    truncateBeforeLoad: "true"
    keyspaces:
      - "sunbird"
      - "sb_content_store"
      - "sunbird_courses"
      - "sb_hierarchy_store"
      - "qmzbm_form_service"
      - "sunbird_notifications"
      - "sb_category_store"
      - "dialcodes"
      - "sb_dialcode_store"
      - "sb_question_store"
      - "apzvp_review_comment"

  janusgraph:
    enabled: false
    host: "janusgraph.sunbird.svc.cluster.local"
    port: 8182
    username: "janusgraph"
    password: ""
    podLabel: "app.kubernetes.io/name=janusgraph"
    container: "janusgraph"

  elasticsearch:
    enabled: false
    host: "elasticsearch.sunbird.svc.cluster.local"
    port: 9200
    username: "elastic"
    password: ""
    podName: "elasticsearch-master-0"
    snapshotName: "migration_snapshot"
    repositoryName: "migration_repo"
    keystorePath: "/opt/bitnami/elasticsearch/bin/elasticsearch-keystore"

# -----------------------------------------------------------------------------
# Job runtime settings
# -----------------------------------------------------------------------------
jobs:
  image: "ubuntu:22.04"
  pullPolicy: "IfNotPresent"
  ttlSecondsAfterFinished: 3600
  backoffLimit: 50
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

# -----------------------------------------------------------------------------
# Validation
# -----------------------------------------------------------------------------
validation:
  enabled: true
  strictMode: false

# -----------------------------------------------------------------------------
# DB fix-ups (write directly to YB / ES — no Spark app services required)
# Run between DB restore steps. keycloakCredentials after YSQL; createdatBackfill after ES.
# -----------------------------------------------------------------------------
dbFixups:
  keycloakCredentials:
    enabled: false
    adminPassword: ""                # Admin password for Keycloak master realm
    secretSuffix: ""                 # Suffix appended to rotated client secrets

  createdatBackfill:
    enabled: false
    ybPod: "yb-tserver-0"
    keyspace: "sunbird"

# -----------------------------------------------------------------------------
# Post-migration fix-ups (require Spark app services running — knowlg, keycloak)
# Run AFTER bundles are deployed and healthy.
# -----------------------------------------------------------------------------
postMigration:
  # Reconcile migrated keycloak realm with the Spark chart's rendered realm.json.
  # Preserves all migrated users/sessions; only patches realm settings,
  # client config, auth flows, required actions to match chart.
  keycloakRealmReconcile:
    enabled: false
    keycloakUrl: "http://keycloak.sunbird.svc.cluster.local:8080"
    realm: "sunbird"
    namespace: "sunbird"                             # ns where keycloak runs
    adminUser: "admin"
    adminPassword: ""                # Or pull from secret via env
    realmConfigMap: "keycloak"                       # ConfigMap holding rendered realm.json
    realmConfigMapKey: "realm.json"                  # key inside the ConfigMap

  hierarchyFix:
    enabled: false
    ybPod: "yb-tserver-0"
    knowlgServiceHost: "knowlg-service.sunbird.svc.cluster.local"
    knowlgServicePort: 9000
    dryRun: false

  userProgressSync:
    enabled: false
    ybPod: "yb-tserver-0"
    keyspace: "sunbird_courses"
    table: "user_enrolments"
    keycloakRealm: "sunbird"
    keycloakClientId: "lms"
    adminUsername: ""                  # Admin username (e.g., admin@yopmail.com)
    adminPassword: ""                  # Admin password
    lernServiceHost: "lern-service.sunbird.svc.cluster.local"
    lernServicePort: 9000
    activityApiDelaySeconds: 0.1
    activityApiTimeoutSeconds: 30
    progressEvery: 100
    dryRun: false
