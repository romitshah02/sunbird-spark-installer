{{- if .Values.postMigration.keycloakRealmReconcile.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "database-import.fullname" . }}-keycloak-realm-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database-import.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-realm-reconcile
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "database-import.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-realm-reconcile
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "database-import.serviceAccountName" . }}
      initContainers:
      # Fetch rendered realm.json from learnbb keycloak ConfigMap
      - name: fetch-realm-json
        image: {{ .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            echo "==> Installing curl, ca-certificates..."
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends curl ca-certificates
            echo "==> Installing kubectl..."
            curl -sLO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
            install -m 0755 kubectl /usr/local/bin/kubectl
            echo "==> Fetching realm.json from {{ .Values.postMigration.keycloakRealmReconcile.namespace }}/{{ .Values.postMigration.keycloakRealmReconcile.realmConfigMap }}..."
            kubectl get configmap {{ .Values.postMigration.keycloakRealmReconcile.realmConfigMap }} \
              -n {{ .Values.postMigration.keycloakRealmReconcile.namespace }} \
              -o jsonpath='{.data.realm\.json}' \
              > /tmp/realm.json
            wc -c /tmp/realm.json
            echo "==> Done."
        volumeMounts:
        - name: temp
          mountPath: /tmp
      containers:
      - name: keycloak-realm-reconcile
        image: {{ .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            echo "==> Installing python3, ca-certificates..."
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends python3 ca-certificates
            echo "==> Running keycloak_apply_realm_reconcile.py..."
            python3 /scripts/keycloak_apply_realm_reconcile.py \
              --keycloak-url "$KC_URL" \
              --admin-user "$KC_USER" \
              --admin-pass "$KC_PASS" \
              --realm "$KC_REALM" \
              --new-realm-file /tmp/realm.json
        env:
        - name: KC_URL
          value: {{ .Values.postMigration.keycloakRealmReconcile.keycloakUrl | quote }}
        - name: KC_REALM
          value: {{ .Values.postMigration.keycloakRealmReconcile.realm | quote }}
        - name: KC_USER
          value: {{ .Values.postMigration.keycloakRealmReconcile.adminUser | quote }}
        - name: KC_PASS
          value: {{ .Values.postMigration.keycloakRealmReconcile.adminPassword | quote }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: temp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.jobs.resources | nindent 12 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "database-import.scriptsConfigMap" . }}
          defaultMode: 0755
      - name: temp
        emptyDir: {}
{{- end }}
