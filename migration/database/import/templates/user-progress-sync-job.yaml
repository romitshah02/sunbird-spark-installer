{{- if .Values.postMigration.userProgressSync.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "database-import.fullname" . }}-user-progress-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database-import.labels" . | nindent 4 }}
    app.kubernetes.io/component: user-progress-sync
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "8"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "database-import.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: user-progress-sync
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "database-import.serviceAccountName" . }}
      containers:
      - name: user-progress-sync
        image: {{ .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        command: ["/bin/bash"]
        args: ["/scripts/user-progress-sync.sh"]
        env:
        - name: YB_POD
          value: {{ .Values.postMigration.userProgressSync.ybPod | quote }}
        - name: YB_NAMESPACE
          value: {{ .Values.target.namespace | default "sunbird" | quote }}
        - name: KEYSPACE
          value: {{ .Values.postMigration.userProgressSync.keyspace | quote }}
        - name: TABLE
          value: {{ .Values.postMigration.userProgressSync.table | quote }}
        - name: KEYCLOAK_REALM
          value: {{ .Values.postMigration.userProgressSync.keycloakRealm | quote }}
        - name: KEYCLOAK_CLIENT_ID
          value: {{ .Values.postMigration.userProgressSync.keycloakClientId | quote }}
        - name: ADMIN_USERNAME
          value: {{ .Values.postMigration.userProgressSync.adminUsername | quote }}
        - name: ADMIN_PASSWORD
          value: {{ .Values.postMigration.userProgressSync.adminPassword | quote }}
        - name: LERN_SERVICE_HOST
          value: {{ .Values.postMigration.userProgressSync.lernServiceHost | quote }}
        - name: LERN_SERVICE_PORT
          value: {{ .Values.postMigration.userProgressSync.lernServicePort | quote }}
        - name: ACTIVITY_API_DELAY_SECONDS
          value: {{ .Values.postMigration.userProgressSync.activityApiDelaySeconds | quote }}
        - name: ACTIVITY_API_TIMEOUT_SECONDS
          value: {{ .Values.postMigration.userProgressSync.activityApiTimeoutSeconds | quote }}
        - name: PROGRESS_EVERY
          value: {{ .Values.postMigration.userProgressSync.progressEvery | quote }}
        - name: DRY_RUN
          value: {{ .Values.postMigration.userProgressSync.dryRun | quote }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: temp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.jobs.resources | nindent 12 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "database-import.scriptsConfigMap" . }}
          defaultMode: 0755
      - name: temp
        emptyDir: {}
{{- end }}
