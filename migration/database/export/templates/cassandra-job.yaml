{{- if .Values.databases.cassandra.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "database-export.fullname" . }}-cassandra
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database-export.labels" . | nindent 4 }}
    app.kubernetes.io/component: cassandra-export
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "database-export.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cassandra-export
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "database-export.fullname" . }}-sa
      containers:
      - name: cassandra-export
        image: {{ .Values.databases.cassandra.image | default .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        securityContext:
          runAsUser: 0
        command: ["/bin/bash"]
        args: ["/scripts/cassandra-export.sh"]
        env:
        - name: CASSANDRA_HOST
          value: {{ .Values.databases.cassandra.host | quote }}
        - name: CASSANDRA_PORT
          value: {{ .Values.databases.cassandra.port | quote }}
        - name: CASSANDRA_POD_NAME
          value: {{ .Values.databases.cassandra.podName | quote }}
        - name: CASSANDRA_POD_NAMESPACE
          value: {{ .Values.databases.cassandra.podNamespace | quote }}
        {{- if .Values.databases.cassandra.secretName }}
        - name: CASSANDRA_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.databases.cassandra.secretName }}
              key: username
        - name: CASSANDRA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.databases.cassandra.secretName }}
              key: password
        {{- else }}
        - name: CASSANDRA_USERNAME
          value: {{ .Values.databases.cassandra.username | quote }}
        - name: CASSANDRA_PASSWORD
          value: {{ .Values.databases.cassandra.password | quote }}
        {{- end }}
        - name: STORAGE_TYPE
          value: {{ .Values.source.cloud | quote }}
        - name: STORAGE_CONTAINER
          value: {{ .Values.source.container | quote }}
        - name: AZURE_STORAGE_ACCOUNT
          value: {{ .Values.source.storageAccount | quote }}
        - name: AZURE_STORAGE_KEY
          value: {{ .Values.source.accessKey | quote }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: temp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.jobs.resources | nindent 12 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "database-export.scriptsConfigMap" . }}
          defaultMode: 0755
      - name: temp
        emptyDir: {}
{{- end }}
