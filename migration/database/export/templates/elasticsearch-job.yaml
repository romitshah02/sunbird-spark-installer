{{- if .Values.databases.elasticsearch.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "database-export.fullname" . }}-elasticsearch
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database-export.labels" . | nindent 4 }}
    app.kubernetes.io/component: elasticsearch-snapshot
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "database-export.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: elasticsearch-snapshot
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "database-export.fullname" . }}-sa
      containers:
      - name: elasticsearch-snapshot
        image: {{ .Values.databases.elasticsearch.image | default .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        securityContext:
          runAsUser: 0
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            echo "==> Installing python3 and curl..."
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends python3 curl ca-certificates
            echo "==> Downloading kubectl (v1.28.0)..."
            curl -fL --connect-timeout 30 --max-time 180 --retry 3 --retry-delay 5 \
              -o /usr/local/bin/kubectl \
              "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
            chmod +x /usr/local/bin/kubectl
            kubectl version --client=true || true
            echo "==> Running elasticsearch-snapshot.py..."
            python3 /scripts/elasticsearch-snapshot.py
        env:
        - name: SOURCE_ES_URL
          value: "http://{{ .Values.databases.elasticsearch.host }}:{{ .Values.databases.elasticsearch.port }}"
        - name: AZURE_STORAGE_ACCOUNT_NAME
          value: {{ .Values.source.storageAccount | quote }}
        - name: AZURE_STORAGE_ACCOUNT_KEY
          value: {{ .Values.source.accessKey | quote }}
        - name: AZURE_CONTAINER_NAME
          value: {{ .Values.source.container | quote }}
        - name: AZURE_BASE_PATH
          value: {{ .Values.source.elasticsearch_path | quote }}
        - name: SNAPSHOT_NAME
          value: {{ .Values.databases.elasticsearch.snapshotName | quote }}
        - name: REPOSITORY_NAME
          value: {{ .Values.databases.elasticsearch.repositoryName | quote }}
        - name: SOURCE_ES_POD_NAME
          value: {{ .Values.databases.elasticsearch.podName | quote }}
        - name: SOURCE_ES_NAMESPACE
          value: {{ .Values.databases.elasticsearch.podNamespace | quote }}
        - name: ES_KEYSTORE_PATH
          value: {{ .Values.databases.elasticsearch.keystorePath | quote }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: temp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.jobs.resources | nindent 12 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "database-export.scriptsConfigMap" . }}
          defaultMode: 0755
      - name: temp
        emptyDir: {}
{{- end }}
