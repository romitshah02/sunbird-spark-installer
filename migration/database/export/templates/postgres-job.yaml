{{- if .Values.databases.postgresql.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "database-export.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database-export.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-export
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "database-export.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-export
    spec:
      restartPolicy: OnFailure
      containers:
      - name: postgres-export
        image: {{ .Values.jobs.image }}
        imagePullPolicy: {{ .Values.jobs.pullPolicy }}
        command: ["/bin/bash"]
        args: ["/scripts/postgres-export.sh"]
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.databases.postgresql.host | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.databases.postgresql.port | quote }}
        {{- if .Values.databases.postgresql.secretName }}
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.databases.postgresql.secretName }}
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.databases.postgresql.secretName }}
              key: password
        {{- else }}
        - name: POSTGRES_USER
          value: {{ .Values.databases.postgresql.username | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.databases.postgresql.password | quote }}
        {{- end }}
        - name: STORAGE_TYPE
          value: {{ .Values.source.cloud | quote }}
        - name: STORAGE_CONTAINER
          value: {{ .Values.source.container | quote }}
        - name: AZURE_STORAGE_ACCOUNT
          value: {{ .Values.source.storageAccount | quote }}
        - name: AZURE_STORAGE_KEY
          value: {{ .Values.source.accessKey | quote }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: temp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.jobs.resources | nindent 12 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "database-export.scriptsConfigMap" . }}
          defaultMode: 0755
      - name: temp
        emptyDir: {}
{{- end }}
