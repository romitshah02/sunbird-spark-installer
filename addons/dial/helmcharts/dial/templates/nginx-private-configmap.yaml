{{- if .Values.nginx.privateIngress.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  # This name MUST match what the core nginx-private-ingress deployment.yaml
  # projected volume references: dial-private-nginx-config
  name: dial-private-nginx-config
  namespace: {{ .Release.Namespace }}
data:
  # dial-private.conf is picked up by the core private nginx via:
  #   include /etc/nginx/conf.d/addons/*.conf;
  # Removing this addon chart removes this ConfigMap → nginx reloads without it.
  dial-private.conf: |
    location /dial/ {
      set $target http://dial-service:9000;
      rewrite ^/dial/(.*) /$1 break;
      proxy_http_version 1.1;
      proxy_pass $target;
    }
{{- end }}
