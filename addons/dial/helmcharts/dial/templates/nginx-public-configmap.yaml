{{- if .Values.nginx.publicIngress.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  # This name MUST match what the core nginx-public-ingress deployment.yaml
  # projected volume references: dial-public-nginx-config
  name: dial-public-nginx-config
  namespace: {{ .Release.Namespace }}
data:
  # dial-public.conf is picked up by the core public nginx via:
  #   include /etc/nginx/conf.d/addons/*.conf;
  # Removing this addon chart removes this ConfigMap → nginx reloads without it.
  dial-public.conf: |
    location /dial/ {
      if ($dial_upstream_host = kong) {
          rewrite ^/dial/(.*) /api/dialcode/v2/read/$1;
      }
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Scheme $scheme;
      proxy_connect_timeout 5;
      proxy_send_timeout 60;
      proxy_read_timeout 70;
      proxy_set_header    X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_http_version 1.1;
      proxy_set_header X-Request-ID $sb_request_id;
      proxy_pass http://$dial_upstream_host;
    }
{{- end }}
