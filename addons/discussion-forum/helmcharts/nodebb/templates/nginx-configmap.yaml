{{- if .Values.nginx.publicIngress.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  # This name MUST match what the core nginx-public-ingress deployment.yaml
  # projected volume references: discussion-forum-nginx-config
  name: discussion-forum-nginx-config
  namespace: {{ .Release.Namespace }}
data:
  # nodebb.conf is picked up by the core public nginx via:
  #   include /etc/nginx/conf.d/addons/*.conf;
  # Removing this addon chart removes this ConfigMap → nginx reloads without it.
  # To disable without uninstalling the addon, set nginx.publicIngress.enabled=false.
  nodebb.conf: |
    location /discussions/ {
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $http_host;
      proxy_set_header X-NginX-Proxy true;
      proxy_redirect off;
      # Socket.IO Support
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://nodebb:4567;
    }
    location ~* ^/discussion-ui/(.*) {
      gzip            on;
      gzip_min_length 100000;
      gzip_proxied    expired no-cache no-store private auth;
      gzip_types application/javascript application/x-javascript text/css text/javascript;
      set $discussion_bucket "https://{{ .Values.global.object_storage_endpoint }}";
      set $url_full          '$1';
      proxy_http_version     1.1;
      proxy_set_header       Host "{{ .Values.global.object_storage_endpoint }}";
      resolver {{ .Values.global.dnsService }}.{{ .Values.global.dnsNamespace }}.svc.{{ .Values.global.clusterDomain }}.;
      proxy_set_header       Authorization '';
      proxy_hide_header      Access-Control-Allow-Origin;
      proxy_hide_header      Access-Control-Allow-Methods;
      proxy_hide_header      x-amz-id-2;
      proxy_hide_header      x-amz-request-id;
      proxy_hide_header      Set-Cookie;
      proxy_ignore_headers   "Set-Cookie";
      proxy_buffering        off;
      proxy_intercept_errors on;
      add_header             Access-Control-Allow-Origin "*";
      add_header             Access-Control-Allow-Methods GET;
      proxy_pass             $discussion_bucket/discussion-ui/$url_full;
    }
{{- end }}
