# Addons Global Values
# Shared configuration for all Sunbird Spark addons

global:
  # Service endpoints
  elasticsearch:
    host: "elasticsearch"
    port: 9200
  
  redis:
    host: "redis-master"
    port: 6379
  
  yugabyte:
    host: "yb-tserver-service"
    port: 9042
  
  kafka:
    host: "kafka"
    port: 9092

  janusgraph:
    host: "janusgraph"
    port: 8182

  installation:
    id: "sunbird"
  
  channel:
    default: "sunbird"

  keycloak_kid_keys_configmap: keycloak-kids-keys
  keycloak_key_configmap: keycloak-key
