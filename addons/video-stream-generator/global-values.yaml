# Video Stream Generator Addon Global Values
# This file contains all the necessary values for standalone video-stream-generator deployment

global:
  # Service endpoints (required by the chart templates)
  elasticsearch:
    host: "elasticsearch-master"
    port: 9200
  
  redis:
    host: "redis-master"
    port: 6379
  
  yugabyte:
    host: "yb-tserver-service"
    port: 9042
  
  
  kafka:
    host: "kafka"
    port: 9092
  
  neo4j:
    host: "neo4j"
    port: 7687
  
  serviceAccount:
    create: false

  knowledgeflink:
    registry: "ghcr.io"
    repository: "sunbird-knowlg/knowledge-platform-jobs"
    tag: "spark-v0.1_b7e896f"

    resources:
      requests:
        cpu: 100m
        memory: 1024Mi
      limits:
        cpu: 1
      memory: 2048Mi  

  