name: Spark Platform Addons

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (must match folder name in configs/)'
        required: true
        type: choice
        options:
          - your-env   # Replace this with your environment name (e.g. dev, prod, staging)
        default: your-env
      config_branch:
        description: 'Config repository branch (your private repo)'
        required: true
        type: string
        default: main
      source_branch:
        description: 'Source repository branch (sunbird-spark-installer - public)'
        required: true
        type: string
        default: main

      # ── INFRA ADDONS — DIAL OpenTofu ─────────────────────────────────
      run_dial_infra:
        description: '1️⃣ Run DIAL addon OpenTofu (storage container provisioning)'
        type: boolean
        default: false

      # ── DEPLOY ADDONS ────────────────────────────────────────────────
      run_addon_components:
        description: '2️⃣ Deploy addon components'
        type: boolean
        default: false
      addon_dial:
        description: '   ↳ DIAL'
        type: boolean
        default: false
      addon_discussion_forum:
        description: '   ↳ Discussion Forum'
        type: boolean
        default: false
      addon_video_stream_generator:
        description: '   ↳ Video Stream Generator'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write

env:
  CONFIG_PATH: "configs/${{ inputs.environment }}"
  ENV_FOLDER: "sunbird-spark-installer/opentofu/azure/${{ inputs.environment }}"

# ════════════════════════════════════════════════════════════════════════════
# JOB 1 — INFRA ADDONS (DIAL OpenTofu)
# ════════════════════════════════════════════════════════════════════════════
jobs:
  infra-addons:
    name: "1 — Infra Addons (DIAL OpenTofu)"
    if: ${{ inputs.run_dial_infra }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout Configuration Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.config_branch }}

      - name: Clone Source Repository
        run: |
          git clone --depth 1 --branch ${{ inputs.source_branch }} \
            https://github.com/Sunbird-Spark/sunbird-spark-installer.git sunbird-spark-installer
          echo "✅ Cloned source repository (branch: ${{ inputs.source_branch }})"

      - name: Azure Login (Infra)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_INFRA_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Decrypt Config Files
        run: |
          pip install ansible

          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass.txt

          ansible-vault decrypt $CONFIG_PATH/global-values.yaml \
            --vault-password-file=/tmp/vault_pass.txt
          echo "✅ global-values.yaml decrypted"

          if [ -f "$CONFIG_PATH/global-cloud-values.yaml" ]; then
            ansible-vault decrypt $CONFIG_PATH/global-cloud-values.yaml \
              --vault-password-file=/tmp/vault_pass.txt
            echo "✅ global-cloud-values.yaml decrypted"
          fi

          rm /tmp/vault_pass.txt

      - name: Install Terraform Tools
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | sudo sh -s -- --install-method standalone
          sudo wget -qO /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.21/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          tofu --version && terragrunt --version && yq --version

      - name: Setup Environment Folder
        run: |
          mkdir -p $ENV_FOLDER
          cp $CONFIG_PATH/global-values.yaml $ENV_FOLDER/global-values.yaml
          if [ -f "$CONFIG_PATH/global-cloud-values.yaml" ]; then
            cp $CONFIG_PATH/global-cloud-values.yaml $ENV_FOLDER/global-cloud-values.yaml
          else
            echo "{}" > $ENV_FOLDER/global-cloud-values.yaml
          fi

      - name: 1️⃣ run_dial_infra
        run: |
          if [ -f "$ENV_FOLDER/tf.sh" ]; then
            source $ENV_FOLDER/tf.sh
          elif [ -f "$CONFIG_PATH/tf.sh" ]; then
            source $CONFIG_PATH/tf.sh
          else
            echo "❌ tf.sh not found — run core infra first"
            exit 1
          fi

          export ENV_NAME="${{ inputs.environment }}"
          export TERRAGRUNT_TFPATH=$(which tofu)

          echo "resource_group_name = \"$AZURE_OPENTOFU_BACKEND_RG\"" > \
            sunbird-spark-installer/addons/dial/opentofu/azure/storage/override.auto.tfvars

          cd sunbird-spark-installer/addons/dial/opentofu/azure
          terragrunt run-all apply --terragrunt-non-interactive
          echo "✅ DIAL addon OpenTofu completed"

      - name: Encrypt and Commit Addon Configs
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass.txt

          ADDON_CLOUD="sunbird-spark-installer/addons/global-cloud-values.yaml"
          if [ -f "$ADDON_CLOUD" ]; then
            mkdir -p $CONFIG_PATH/addons
            cp "$ADDON_CLOUD" $CONFIG_PATH/addons/global-cloud-values.yaml
            ansible-vault encrypt $CONFIG_PATH/addons/global-cloud-values.yaml \
              --vault-password-file=/tmp/vault_pass.txt
            echo "✓ Encrypted: addons/global-cloud-values.yaml"
          fi

          rm /tmp/vault_pass.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $CONFIG_PATH/addons/
          git commit -m "chore: encrypted addon configs [${{ inputs.environment }}] [skip ci]" \
            || echo "No changes to commit"
          git push || echo "Push failed or no changes"
          echo "✅ Addon configs committed"

      - name: Infra Addons Summary
        if: always()
        run: |
          echo "================================================"
          echo "     INFRA ADDONS SUMMARY"
          echo "================================================"
          echo "Environment : ${{ inputs.environment }}"
          [ "${{ inputs.run_dial_infra }}" == "true" ] && echo "  ✅ 1️⃣  DIAL OpenTofu" || echo "  ⏭️  1️⃣  DIAL OpenTofu (skipped)"
          echo "================================================"

# ════════════════════════════════════════════════════════════════════════════
# JOB 2 — DEPLOY ADDONS (DIAL, Discussion Forum, Video Stream Generator)
# ════════════════════════════════════════════════════════════════════════════
  deploy-addons:
    name: "2 — Deploy Addons"
    if: ${{ always() && inputs.run_addon_components }}
    needs: [infra-addons]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout Configuration Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.config_branch }}

      - name: Clone Source Repository
        run: |
          git clone --depth 1 --branch ${{ inputs.source_branch }} \
            https://github.com/Sunbird-Spark/sunbird-spark-installer.git sunbird-spark-installer
          echo "✅ Cloned source repository (branch: ${{ inputs.source_branch }})"

      - name: Azure Login (Deploy)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Decrypt Config Files
        run: |
          pip install ansible

          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass.txt

          ansible-vault decrypt $CONFIG_PATH/global-values.yaml \
            --vault-password-file=/tmp/vault_pass.txt
          echo "✅ global-values.yaml decrypted"

          if [ -f "$CONFIG_PATH/global-cloud-values.yaml" ]; then
            ansible-vault decrypt $CONFIG_PATH/global-cloud-values.yaml \
              --vault-password-file=/tmp/vault_pass.txt
            echo "✅ global-cloud-values.yaml decrypted"
          fi

          if [ -f "$CONFIG_PATH/addons/global-cloud-values.yaml" ]; then
            ansible-vault decrypt $CONFIG_PATH/addons/global-cloud-values.yaml \
              --vault-password-file=/tmp/vault_pass.txt
            if [ -f "sunbird-spark-installer/addons/global-cloud-values.yaml" ]; then
              yq eval-all 'select(fileIndex==0) * select(fileIndex==1)' \
                sunbird-spark-installer/addons/global-cloud-values.yaml \
                $CONFIG_PATH/addons/global-cloud-values.yaml \
                > /tmp/merged-addon-cloud.yaml
              cp /tmp/merged-addon-cloud.yaml sunbird-spark-installer/addons/global-cloud-values.yaml
              echo "✅ Addon cloud values merged"
            else
              cp $CONFIG_PATH/addons/global-cloud-values.yaml \
                sunbird-spark-installer/addons/global-cloud-values.yaml
              echo "✅ Addon cloud values copied"
            fi
          fi

          rm /tmp/vault_pass.txt

      - name: Setup Environment Folder
        run: |
          cp -r sunbird-spark-installer/opentofu/azure/template $ENV_FOLDER
          cp $CONFIG_PATH/global-values.yaml $ENV_FOLDER/global-values.yaml
          if [ -f "$CONFIG_PATH/global-cloud-values.yaml" ]; then
            cp $CONFIG_PATH/global-cloud-values.yaml $ENV_FOLDER/global-cloud-values.yaml
          else
            echo "{}" > $ENV_FOLDER/global-cloud-values.yaml
          fi
          echo "✅ Environment folder ready: $ENV_FOLDER"

      - name: Install Deploy Tools
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          kubectl version --client && helm version && yq --version

      - name: Get AKS Credentials
        run: |
          BUILDING_BLOCK=$(yq '.global.building_block' $CONFIG_PATH/global-values.yaml)
          CLUSTER_NAME="${BUILDING_BLOCK}-${{ inputs.environment }}"
          az aks get-credentials \
            --name "$CLUSTER_NAME" \
            --resource-group "$CLUSTER_NAME" \
            --overwrite-existing
          kubectl get nodes
          echo "✅ AKS credentials configured (cluster: $CLUSTER_NAME)"

      - name: 2️⃣ addon — DIAL
        if: ${{ inputs.addon_dial }}
        run: |
          export ENV_NAME="${{ inputs.environment }}"
          bash sunbird-spark-installer/addons/dial/script/addon.sh install azure
          echo "✅ DIAL installed"

      - name: 2️⃣ addon — Discussion Forum
        if: ${{ inputs.addon_discussion_forum }}
        run: |
          export ENV_NAME="${{ inputs.environment }}"
          bash sunbird-spark-installer/addons/discussion-forum/script/addon.sh install azure
          echo "✅ Discussion Forum installed"

      - name: 2️⃣ addon — Video Stream Generator
        if: ${{ inputs.addon_video_stream_generator }}
        run: |
          export ENV_NAME="${{ inputs.environment }}"
          bash sunbird-spark-installer/addons/video-stream-generator/script/addon.sh install azure
          echo "✅ Video Stream Generator installed"

      - name: Deploy Addons Summary
        if: always()
        run: |
          echo "================================================"
          echo "     DEPLOY ADDONS SUMMARY"
          echo "================================================"
          echo "Environment : ${{ inputs.environment }}"
          [ "${{ inputs.addon_dial }}"                   == "true" ] && echo "  ✅ DIAL"                   || echo "  ⏭️  DIAL (skipped)"
          [ "${{ inputs.addon_discussion_forum }}"       == "true" ] && echo "  ✅ Discussion Forum"       || echo "  ⏭️  Discussion Forum (skipped)"
          [ "${{ inputs.addon_video_stream_generator }}" == "true" ] && echo "  ✅ Video Stream Generator" || echo "  ⏭️  Video Stream Generator (skipped)"
          echo "================================================"
