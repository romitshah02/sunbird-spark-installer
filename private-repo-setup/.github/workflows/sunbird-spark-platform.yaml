          [ "${{ inputs.create_client_forms }}"  == "true" ] && echo "  ✅ 1️⃣2️⃣  create_client_forms"  || echo "  ⏭️  1️⃣2️⃣  create_client_forms (skipped)"
          [ "${{ inputs.migrate_forms }}"          == "true" ] && echo "  ✅ 1️⃣3️⃣  migrate_forms"          || echo "  ⏭️  1️⃣3️⃣  migrate_forms (skipped)"
          echo "================================================"
