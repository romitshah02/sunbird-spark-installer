SUNBIRD_YUGABYTE_HOST: "{{ .Values.global.yugabyte.host }}"
SUNBIRD_YUGABYTE_PORT: "{{ .Values.global.yugabyte.postgresql_port }}"
SUNBIRD_YUGABYTE_DATABASE: "{{ .Values.global.yugabyte.database | default "portal" }}"
SUNBIRD_YUGABYTE_USER: "{{ .Values.global.yugabyte.user | default "yugabyte" }}"
SUNBIRD_YUGABYTE_PASSWORD: "{{ .Values.global.yugabyte.password | default}}"
ENVIRONMENT: "{{.Values.sunbird_environment | default "staging"}}"
DOMAIN_URL: "https://{{.Values.global.domain}}"
KONG_ANONYMOUS_FALLBACK_TOKEN: "{{.Values.global.sunbird_anonymous_default_token}}"
KONG_ANONYMOUS_DEVICE_REGISTER_TOKEN: "{{.Values.global.sunbird_anonymous_register_token}}"
SUNBIRD_ANONYMOUS_SESSION_SECRET: "{{ .Values.global.random_string }}"
SUNBIRD_LOGGEDIN_SESSION_SECRET: "{{ .Values.global.random_string }}"
KONG_LOGGEDIN_FALLBACK_TOKEN: "{{.Values.global.sunbird_logged_default_token}}"
KONG_LOGGEDIN_DEVICE_REGISTER_TOKEN: "{{.Values.global.sunbird_loggedin_register_token}}"
PORTAL_REALM: "{{.Values.sunbird_portal_realm | default "sunbird"}}"
KEYCLOAK_BASE_SERVER_URL: "https://{{.Values.global.domain}}/auth/"
PORTAL_AUTH_SERVER_CLIENT: "{{.Values.sunbird_portal_auth_server_client | default "portal"}}"
PORT: "{{.Values.sunbird_port | default "3000"}}"
SUNBIRD_PORTAL_LOG_LEVEL: "{{.Values.sunbird_portal_log_level | default "debug"}}"
SUNBIRD_ANONYMOUS_SESSION_TTL: "{{.Values.sunbird_anonymous_session_ttl | default "1800000"}}"
SUNBIRD_PORTAL_SESSION_STORE: "{{.Values.sunbird_session_store_type | default "yugabyte"}}"
GOOGLE_RECAPTCHA_VERIFY_URL: https://www.google.com/recaptcha/api/siteverify
LEARN_BASE_URL: "{{.Values.learning_service_base_url | default "http://userorg-service:9000"}}"
GOOGLE_RECAPTCHA_SECRET: "{{.Values.global.google_captcha_private_key | default ""}}"
KONG_URL: "{{.Values.kong_url | default "http://kong:8000"}}"
GOOGLE_OAUTH_CLIENT_ID: "{{.Values.global.sunbird_google_oauth_clientId | default ""}}"
GOOGLE_OAUTH_CLIENT_SECRET: "{{.Values.global.sunbird_google_oauth_clientSecret | default ""}}"
KEYCLOAK_GOOGLE_CLIENT_ID: "{{ .Values.sunbird_google_keycloak_client_id | default "google-auth"}}"
KEYCLOAK_GOOGLE_CLIENT_SECRET: "{{ .Values.google_auth_client_secret }}{{ .Values.global.random_string }}"
