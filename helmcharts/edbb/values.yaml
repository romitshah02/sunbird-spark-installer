# Default values for obsrvbb.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

fullname: edbb

provisioningAnnotations: &provisioningAnnotations
  "helm.sh/hook-weight": "-4"
  # "helm.sh/hook": post-install,post-upgrade

redis: &redis
  enabled: true
  registry: "sunbirded.azurecr.io"
  repository: "redis"
  replica:
    replicaCount: 0
  nameOverride: "redis"
  fullnameOverride: "redis"
  auth:
    enabled: false
  host: "redis-master"
  port: 6379
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  master:
    persistence:
      size: 25Gi
    primary:
    resources:
      limits:
        cpu: 0.5
        memory: 2Gi
      requests:
        cpu: 0.5
        memory: 1Gi 
yugabyte: &yugabyte
  enabled: true
  nameOverride: "yugabyte"
  fullnameOverride: "yugabyte"
  host: "yb-tserver-service" 
  port: 9042
  postgresql_port: 5433
  databases:
      - name: "kong"
      - name: "druid_raw"
      - name: "superset"
      - name: "registry"

  image:
    registry: yugabytedb
    repository: yugabyte
    tag: 2025.2.0.0-b131 
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi  
  provisioning:
    annotations: *provisioningAnnotations  
  # Force single replica for Yugabyte masters and tservers (override subchart defaults)
  replicas:
    master: 3
    tserver: 3
  username: "yugabyte"
  password: "yugabyte"  

janusgraph: &janusgraph
  enabled: true
  fullnameOverride: "janusgraph"
  nameOverride: "janusgraph"
  host: "janusgraph"
  port: 8182
  image:
    registry: docker.io
    repository: bitnamilegacy/janusgraph
    tag: 1.1.0-debian-12-r21
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations    

kafka: &kafka
  enabled: true
  nameOverride: kafka
  fullnameOverride: kafka
  clientProtocol: PLAINTEXT
  host: kafka
  port: 9092
  image:
    registry: sunbirded.azurecr.io
    repository: kafka
    tag: 3.3.1-debian-11-r25
  persistence:
    size: 25Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 10
    periodSeconds: 30
    successThreshold: 1
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    failureThreshold: 5
    timeoutSeconds: 10
    periodSeconds: 30
    successThreshold: 1
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations
    replicationFactor: 1
    numPartitions: 1
  resources:
    limits:
      cpu: 1
      memory: 2048Mi
    requests:
      cpu: 750m
      memory: 1024Mi
  listeners:
    client:
      protocol: PLAINTEXT
  controller:
      protocol: PLAINTEXT
  interbroker:
      protocol: PLAINTEXT
  external:
      protocol: PLAINTEXT
  sasl:
    enabledMechanisms: "PLAIN"
    interBrokerMechanism: "PLAIN"
    controllerMechanism: "PLAIN"
  tls:
    autoGenerated:
      enabled: false
    existingSecret: ""

global:
  redis: *redis
  kafka: *kafka
  yugabyte: *yugabyte
  janusgraph: *janusgraph
  keycloak_kid_keys_configmap: keycloak-kids-keys
  keycloak_key_configmap: keycloak-key
  kong_desktop_device_consumer_names_for_opa: '["portal", "desktop"]'

knowledgemw:
  opa_enabled: true

migration:
  yugabyte:
    waitTime: 120

devops_release_branch: release-7.0.0