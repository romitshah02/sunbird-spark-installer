devops_release_branch: release-8.0.0
postgres_migration_image: sunbirded.azurecr.io/postgresql:11.14.0
cassandra_migration_version: main
certregistry:
  opa_enabled: true
userorg:
  opa_enabled: true
lms:
  opa_enabled: true
notification:
  opa_enabled: true
registry:
  opa_enabled: false

provisioningAnnotations: &provisioningAnnotations
  "helm.sh/hook-weight": "-4"


elasticsearch: &es
  enabled: true
  fullnameOverride: "elasticsearch"
  host: "elasticsearch"
  port: 9200
  image:
    registry: docker.io
    repository: bitnami/elasticsearch
    tag: 7.10.2
  master:
    masterOnly: false
    replicaCount: 1
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    heapSize: 2G
    persistence:
      size: 25Gi
  data:
    replicaCount: 0
  coordinating:
    replicaCount: 0
  ingest:
    enabled: false
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations
  sysctlImage:
    registry: sunbirded.azurecr.io
    repository: bitnami-shell-archived
    tag: 11-debian-11-r54

redis: &redis
  enabled: true
  fullnameOverride: "redis"
  auth:
    enabled: false
  host: "redis-master"
  port: 6379
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  replica:
    replicaCount: 0
  master:
    persistence:
      size: 25Gi

yugabyte: &yugabyte
  enabled: true
  nameOverride: "yugabyte"
  fullnameOverride: "yugabyte"
  host: "yb-tserver-service" 
  port: 9042
  postgresql_port: 5433
  databases:
    - name: "keycloak"
    - name: "quartz"
    - name: "userorg"
    - name: "enc-keys"
    - name: "registry"

  image:
    registry: yugabytedb
    repository: yugabyte
    tag: 2025.2.0.0-b131 
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations  
  persistence:
    size: 25Gi  
  # Force single replica for Yugabyte masters and tservers (override subchart defaults)
  replicas:
    master: 3
    tserver: 3
  username: yugabyte  
  password: yugabyte

zookeeper: &zookeeper
  fullnameOverride: zookeeper
  nameOverride: zookeeper
  host: "zookeeper"
  port: 2181
  persistence:
    size: 2Gi

kafka: &kafka
  zookeeper: *zookeeper
  enabled: true
  fullnameOverride: "kafka"
  clientProtocol: PLAINTEXT
  host: "kafka"
  port: 9092
  image:
    registry: sunbirded.azurecr.io
    repository: kafka
    tag: 3.3.1-debian-11-r25
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi

druid: &druid
  enabled: true
  fullnameOverride: "druid"
  host: druid-raw-routers
  port: 8888
  coordinatorhost: druid-raw-coordinators
  coordinatorport: 8081
  overlordhost:  druid-raw-overlords
  overlordport: 8090
  brokerhost: druid-raw-brokers
  brokerport: 8082
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi

postgresql: &postgresql
  enabled: true
  fullnameOverride: "postgresql"
  image:
    registry: "sunbirded.azurecr.io"
    repository: postgresql
    tag: 11.14.0
  host: postgresql
  port: 5432
  postgresqlUsername: postgres
  postgresqlPassword: postgres
  provisioning:
    annotations: *provisioningAnnotations
  persistence:
    size: 25Gi
  databases:
  - name: "registry"

neo4j: &neo4j
  enabled: true
  host: "neo4j"
  port: 7687
  boltPort: 8687
  shard_id: 1
  image:
    repository: sunbirded.azurecr.io/neo4j
    tag: "3.3.0"
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations

global:
  redis: *redis
  elasticsearch: *es
  yugabyte: *yugabyte
  zookeeper: *zookeeper
  postgresql: *postgresql
  kafka: *kafka
  druid: *druid
  neo4j: *neo4j
  provisioningAnnotations: *provisioningAnnotations
  keycloak_kid_keys_configmap: keycloak-kids-keys
  keycloak_key_configmap: keycloak-key
  kong_desktop_device_consumer_names_for_opa: '["portal", "desktop"]'

migration:
  yugabyte:
    waitTime: 120
  elasticsearch:
    waitTime: 120
  postgresql:
    waitTime: 120
