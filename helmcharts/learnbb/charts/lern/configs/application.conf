notificationActorSystem {
  default-dispatcher {
    type = "Dispatcher"
    executor = "fork-join-executor"
    fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
    }
    throughput = 1
  }
  notification-dispatcher {
    type = "Dispatcher"
    executor = "fork-join-executor"
    fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
    }
    throughput = 1
  }
  pekko {
    actor {
      notification-dispatcher {
        type = "Dispatcher"
        executor = "fork-join-executor"
        fork-join-executor {
            parallelism-min = 8
            parallelism-factor = 32.0
            parallelism-max = 64
        }
        throughput = 1
      }
      deployment {
          # --- NOTIFICATION ACTORS ---
          "/HealthActor" { router = smallest-mailbox-pool, nr-of-instances = 5, dispatcher = default-dispatcher }
          "/NotificationActor" { router = smallest-mailbox-pool, nr-of-instances = 10, dispatcher = notification-dispatcher }
          "/CreateNotificationActor" { router = smallest-mailbox-pool, nr-of-instances = 10, dispatcher = notification-dispatcher }
          "/ReadNotificationActor" { router = smallest-mailbox-pool, nr-of-instances = 10, dispatcher = notification-dispatcher }
          "/UpdateNotificationActor" { router = smallest-mailbox-pool, nr-of-instances = 10, dispatcher = notification-dispatcher }
          "/DeleteNotificationActor" { router = smallest-mailbox-pool, nr-of-instances = 10, dispatcher = notification-dispatcher }
          "/NotificationTemplateActor" { router = smallest-mailbox-pool, nr-of-instances = 5, dispatcher = notification-dispatcher }
      }
    }
  }
}

## Internationalisation
play.i18n {
  langs = [ "en" ]
}

## Play HTTP settings
play.http {
  errorHandler = modules.ErrorHandler
  actionCreator = modules.OnRequestHandler
  parser.maxDiskBuffer=50MB
  parser.maxMemoryBuffer=50MB
  # Merged secret keys - using userorg as default
  secret.key="userorgservice:RBl6NfkoO5tNYblTRmf3ZLcDIp5@oVjJMDFHdR74?tDvH2n"
}

## Netty Provider
play.server {
  provider = "play.core.server.NettyServerProvider"
  netty {
    eventLoopThreads = 30
    transport = "native"
    maxChunkSize = 30000000
    option {
      child.SO_KEEPALIVE = true
    }
    http {
      idleTimeout = infinite
    }
  }
}

## WS (HTTP Client)
libraryDependencies += javaWs

## Cache
libraryDependencies += cache
play.cache {
  # bindCaches = ["db-cache", "user-cache", "session-cache"]
}

# Logger
logger.root=ERROR
logger.play=OFF
#logger.application=DEBUG

# Authentication
AuthenticationEnabled = true
AUTH_ENABLED = true

# Service Specific Configs

# Assessment Aggregator Configuration (LMS)
assessment_direct_aggregation_enabled=true
kafka_assessment_topic="sunbird.assessment.raw"
kafka_topics_contentstate_invalid="sunbird.contentstate.invalid"
assessment_skip_missing_records=true

# Notification specific
sunbird_notification_keyspace="sunbird_notifications"

# APP Specific config
play.modules {
  enabled += modules.LernServiceStartModule
  enabled += modules.LernServiceActorStartModule
  
  # Disable service-specific start modules as they are replaced by MonolithicStartModule/MonolithicActorStartModule
  disabled += modules.StartModule
  disabled += modules.ActorStartModule
  disabled += utils.module.StartModule
}

play.filters {
  hosts {
    allowed = ["localhost:9000","."]
  }
  enabled += filters.AccessLogFilter
  enabled += filters.CustomGzipFilter
  # Disabled ResponseFilter to prevent excessive response body logging
  # which was causing performance issues and Keycloak retry loops
  # enabled += filters.ResponseFilter
  disabled += filters.ResponseFilter
  disabled += play.filters.csrf.CSRFFilter
}