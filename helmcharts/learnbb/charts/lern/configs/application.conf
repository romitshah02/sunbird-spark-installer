# This is the main configuration file for the Lern Service application.
# https://www.playframework.com/documentation/latest/ConfigFile
# ~~~~~

## Pekko
# https://www.playframework.com/documentation/latest/JavaPekko#Configuration
# ~~~~~
pekko {
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel = "INFO"
  stdout-loglevel = "INFO"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
  log-config-on-start = off

  actor {
    provider = "org.apache.pekko.actor.LocalActorRefProvider"
    serializers {
      java = "org.apache.pekko.serialization.JavaSerializer"
    }
    serialization-bindings {
      "org.sunbird.request.Request" = java
      "org.sunbird.response.Response" = java
    }
    default-dispatcher {
      fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
        task-peeking-mode = "FIFO"
      }
    }
    
    # Custom Dispatchers (Merged from all services)
    rr-usr-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
      }
      throughput = 1
    }
    brr-usr-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 1
        parallelism-factor = 2.0
        parallelism-max = 4
      }
      throughput = 1
    }
    most-used-one-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
      }
      throughput = 1
    }
    most-used-two-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
      }
      throughput = 1
    }
    health-check-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 1
        parallelism-factor = 2.0
        parallelism-max = 2
      }
      throughput = 1
    }
    notification-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
      }
      throughput = 1
    }
    page-mgr-actor-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
      }
      throughput = 1
    }
    tracking-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 8
        parallelism-factor = 32.0
        parallelism-max = 64
      }
      throughput = 1
    }
    rr-dispatcher {
        type = "Dispatcher"
        executor = "fork-join-executor"
        fork-join-executor {
            parallelism-min = 8
            parallelism-factor = 32.0
            parallelism-max = 64
        }
        throughput = 1
    }
    brr-dispatcher {
        type = "Dispatcher"
        executor = "fork-join-executor"
        fork-join-executor {
            parallelism-min = 1
            parallelism-factor = 2.0
            parallelism-max = 4
        }
        throughput = 1
    }

    deployment {
      # --- USERORG ACTORS ---
      "/user_deletion_background_job_actor" { router = smallest-mailbox-pool, nr-of-instances = 5, dispatcher = brr-usr-dispatcher }
      "/user_deletion_background_job_actor/*" { dispatcher = pekko.actor.brr-usr-dispatcher }
      "/user_ownership_transfer_actor" { router = smallest-mailbox-pool, nr-of-instances = 5, dispatcher = brr-usr-dispatcher }
      "/user_ownership_transfer_actor/*" { dispatcher = pekko.actor.brr-usr-dispatcher }
