CONTAINER_NAME: "{{ .Values.global.private_container_name }}"
CLOUD_STORAGE_TYPE: "{{ .Values.global.cloud_service_provider }}"
{{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.azure_client_id }}
AZURE_CLIENT_ID: {{ .Values.global.azure_client_id }}
PRIVATE_CLOUD_STORAGE_SECRET: ""
PRIVATE_CLOUD_STORAGE_KEY: "{{ .Values.global.object_storage_endpoint }}"
{{- else }}
PRIVATE_CLOUD_STORAGE_SECRET: "{{ .Values.global.cloud_storage_secret_key }}"
PRIVATE_CLOUD_STORAGE_KEY: "{{ .Values.global.cloud_storage_access_key }}"
{{- end }}
sunbird_cert_domain_url: "{{ .Values.global.domain }}"
sunbird_cert_enc_service_url: "{{ .Values.sunbird_cert_enc_service_url }}"
download_link_expiry_timeout: "{{ .Values.download_link_expiry_timeout }}"
es_conn_info: "{{ .Values.global.opensearch.host }}:{{ .Values.global.opensearch.port }}"
ITEXT_LICENSE_ENABLED: "{{ .Values.itext_license_enabled }}"
ITEXT_LICENSE_PATH: "{{ .Values.itext_license_path }}"
{{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.azure_client_id }}
PUBLIC_CLOUD_STORAGE_KEY: "{{ .Values.global.object_storage_endpoint }}"
PUBLIC_CLOUD_STORAGE_SECRET: ""
{{- else }}
PUBLIC_CLOUD_STORAGE_KEY: "{{ .Values.global.cloud_storage_access_key }}"
PUBLIC_CLOUD_STORAGE_SECRET: "{{ .Values.global.cloud_storage_secret_key }}"
{{- end }}
PUBLIC_CONTAINER_NAME: "{{ .Values.global.public_container_name }}"
CLOUD_STORAGE_ENDPOINT: "{{ .Values.cloud_public_storage_endpoint }}"
JAVA_OPTIONS: "{{ .Values.java_options }}"
