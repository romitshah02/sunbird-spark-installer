apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-yugabytecql-migration-job
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}-yugabytecql-migration
    scope: provisioning
  annotations:
    {{.Values.global.yugabyte.provisioning.annotations | toYaml }}
spec:
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-yugabytecql-migration
    spec:
      restartPolicy: Never
      volumes:
      - name: shared-volume
        emptyDir: {}
      initContainers:
      - name: wait-for-yugabyte
        image: busybox
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - "timeout {{ .Values.migration.yugabyte.waitTime }} sh -c 'until nc -z  {{ .Values.global.yugabyte.host }} {{ .Values.global.yugabyte.port }}; do echo waiting for yugabyte; sleep 10; done'"
        volumeMounts:
        - name: shared-volume
          mountPath: /opt/shared-volume
      containers:
      - name: migration
        image: {{ .Values.yugabytecql.image.repository }}:{{ .Values.yugabytecql.image.tag }}
        imagePullPolicy: IfNotPresent
        command: ['bash', '-c']
        args:
        - |
          set -ex
          export ENV={{ .Values.global.env | default "dev" }}
          export YCQLSH_HOST={{ .Values.global.yugabyte.host }}
          export YCQLSH_PORT={{ .Values.global.yugabyte.port }}
          export YCQLSH_USERNAME="${YCQLSH_USERNAME:-yugabyte}"
          export YCQLSH_PASSWORD="${YCQLSH_PASSWORD:-yugabyte}"
          # run migrations directly from embedded scripts
          cd /opt/migrations/sunbird-yugabyte-migrations/sunbird-lern
          chmod +x execute_migrations.sh || true
          set +e
          ./execute_migrations.sh $ENV
          MIGRATION_EXIT=$?
          set -e
          # Custom reCAPTCHA site key insertion
          echo "==== Inserting reCAPTCHA site key ===="
          ycqlsh $YCQLSH_HOST $YCQLSH_PORT -u $YCQLSH_USERNAME -p $YCQLSH_PASSWORD -e "INSERT INTO sunbird.system_settings (field, id, value) VALUES ('portal_google_recaptcha_site_key','portal_google_recaptcha_site_key','{{ .Values.global.sunbird_google_captcha_site_key }}');"
          # Print log file to stdout so errors are visible in kubectl logs
          LOG_FILE=$(ls -t /opt/migrations/sunbird-yugabyte-migrations/sunbird-lern/migration_*.log 2>/dev/null | head -1)
          if [ -n "$LOG_FILE" ]; then
            echo "======== MIGRATION LOG ========"
            cat "$LOG_FILE"
            echo "==============================="
          fi
          exit $MIGRATION_EXIT
        volumeMounts:
        - name: shared-volume
          mountPath: /opt/shared-volume
  backoffLimit: 30