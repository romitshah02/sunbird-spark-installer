# NOTE: openai-secret (containing openai_api_key) is provisioned by the
# parent knowledgebb umbrella chart. Deploying this chart standalone
# requires creating the secret manually first.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/sunbird-knowlg/knowledge-platform-jobs
  tag: "release-8.1.0_rc1_e7ac747"
  pullPolicy: IfNotPresent
  pullSecrets: []

podAnnotations: {}

podSecurityContext:
  runAsUser: 0
  fsGroup: 0

securityContext: {}

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8081

commonLabels:
  release: monitoring

ingress: {}

resources:
  requests:
    cpu: 100m
    memory: 500Mi
  limits:
    cpu: 1
    memory: 2048Mi


autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

nodeSelector: {}
tolerations: []
affinity: {}

configmap:
  enabled: false
  mountPath: /config

serviceAccount:
  create: false

serviceMonitor: &serviceMonitor
  enabled: false
  jobmanager:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: monitoring # additional labels e.g. release: prometheus
    honorLabels: true
    jobLabel: "app.kubernetes.io/name"
    port: prom
  taskmanager:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: monitoring # additional labels e.g. release: prometheus
    honorLabels: true
    jobLabel: "app.kubernetes.io/name"
    port: prom

# Example values.yaml structure
initContainers: {}
  # - name: init-myservice
  #   image: busybox:1.28
  #   command: ['sh', '-c', "until nslookup kubernetes.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for myservice; sleep 2; done"]

sidecars: {}
  # - name: log-reader # Sidecar container
  #   image: busybox # Use another busybox image
  #   command: ["/bin/sh"] # Override the default command
  #   args: ["-c", "tail -f /var/log/app.log"] # Run a shell script that tails the log file

opa:
  enabled: false

jobmanager:
  rpc_port: 6123
  blob_port: 6124
  query_port: 6125
  ui_port: 8081
  prom_port: 9250
  heap_memory: 1024

rest_port: 80
resttcp_port: 8081

taskmanager:
  prom_port: 9251
  rpc_port: 6122
  heap_memory: 1024
  replicas: 1
  cpu_requests: 0.3


# S3 Details
s3_access_key: ""
s3_secret_key: ""
s3_endpoint: ""
s3_path_style_access: ""

cloud_storage:
  type: "azure" # not required
cloudstorage_metadatalist: '["appIcon","posterImage","artifactUrl","downloadUrl","variants","previewUrl","pdfUrl", "streamingUrl", "toc_url"]'
cloudstorage_write_base_path: '["https://{{ .Values.global.object_storage_endpoint }}"]'
cloudstorage_read_base_path: "https://{{ .Values.global.object_storage_endpoint }}"
cloudstorage_relative_path_prefix: "CONTENT_STORAGE_BASE_PATH"

log4j_console_properties: |
  # This affects logging for both user code and Flink
  rootLogger.level = INFO
  rootLogger.appenderRef.console.ref = ConsoleAppender

  # Uncomment this if you want to _only_ change Flink's logging
  #logger.flink.name = org.apache.flink
  #logger.flink.level = INFO

  # The following lines keep the log level of common libraries/connectors on
  # log level INFO. The root logger does not override this. You have to manually
  # change the log levels here.
  logger.pekko.name = pekko
  logger.pekko.level = ERROR
  logger.kafka.name= org.apache.kafka
  logger.kafka.level = ERROR
  logger.hadoop.name = org.apache.hadoop
  logger.hadoop.level = ERROR

  # Log all infos to the console
  appender.console.name = ConsoleAppender
  appender.console.type = CONSOLE
  appender.console.layout.type = PatternLayout
  appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n

  # Suppress the irrelevant (wrong) warnings from the Netty channel handler
  logger.netty.name = org.apache.flink.shaded.pekko.org.jboss.netty.channel.DefaultChannelPipeline
  logger.netty.level = OFF

base_config: |
  kafka {
    broker-servers = "{{ .Values.global.kafka.host }}:{{ .Values.global.kafka.port }}"
    producer.broker-servers = "{{ .Values.global.kafka.host }}:{{ .Values.global.kafka.port }}"
    consumer.broker-servers = "{{ .Values.global.kafka.host }}:{{ .Values.global.kafka.port }}"
    producer {
      max-request-size = 1572864
      batch.size = 98304
      linger.ms = 10
      compression = "snappy"
    }
    output.system.event.topic = "{{ .Values.global.env }}.knowlg.system.events"
  }
  job {
    env = "{{ .Values.global.env }}"
    enable.distributed.checkpointing = true

    {{- if eq "oci" .Values.global.checkpoint_store_type }}
    statebackend {
      base.url = "s3://{{ .Values.global.private_container_name }}/checkpoint"
    }

    {{- else if eq "azure" .Values.global.checkpoint_store_type }}
    statebackend {
      {{- if eq .Values.global.cloud_storage_provider "azure" }}
      base.url = "abfs://{{ .Values.global.private_container_name }}@{{ .Values.global.object_storage_endpoint }}/checkpoint"
      {{- else }}
      base.url = "wasbs://{{ .Values.global.private_container_name }}@{{ .Values.global.object_storage_endpoint }}/checkpoint"
      {{- end }}
    }

    {{- else if eq "gcs" .Values.global.checkpoint_store_type }}
    statebackend {
      base.url = "gs://{{ .Values.global.private_container_name }}/checkpoint"
    }
    {{- else }}
    # No valid checkpoint_store_type configured, skipping statebackend.
    {{- end }}
  }
    
  task {
    parallelism = 1
    consumer.parallelism = 1
    checkpointing.compressed = true
    checkpointing.interval = 60000
    checkpointing.pause.between.seconds = 3000
    restart-strategy.attempts = 3
    restart-strategy.delay = 30000 # in milli-seconds
  }
  redis {
  enable: false
  }
  lms-cassandra {
  host = "{{ .Values.global.yugabyte.host }}"
  port = "{{ .Values.global.yugabyte.port }}"
  }

  janusgraph {
  host = "{{ .Values.global.janusgraph.host }}"
  port = "{{ .Values.global.janusgraph.port }}"
  storage.backend = "cql"
  storage.host = "{{ .Values.global.yugabyte.host }}"
  storage.port = "{{ .Values.global.yugabyte.port }}"
  graph = "domain"
  storage.cql.read-consistency-level = "ONE"
  storage.cql.write-consistency-level = "ONE"
  storage.cql.local-datacenter = "datacenter1"
  log.learning_graph_events.backend = "default"

  }

  es {
  basePath = "{{ .Values.global.opensearch.host }}:{{ .Values.global.opensearch.port }}"
  }

flink_jobs:
  transaction-event-processor:
    enabled: true
    serviceMonitor: *serviceMonitor
    config: |+
      include file("/data/flink/conf/base-config.conf")
      job {
        env = "{{ .Values.global.env }}"
      }

      kafka {
        input.topic = "{{ .Values.global.env }}.knowlg.learning.graph.events"
        output.audit.topic = "{{ .Values.global.env }}.knowlg.telemetry.raw"
        output.obsrv.topic = "{{ .Values.global.env }}.knowlg.transaction.meta"
        error.topic = "{{ .Values.global.env }}.knowlg.learning.events.failed"
        groupId = "{{ .Values.global.env }}-transaction-event-processor-group"
        zookeeper = ""
      }

      task {
        consumer.parallelism = 1
        parallelism = 1
        producer.parallelism = 1
        window.time = 60
        router.parallelism = 1
        compositeSearch.parallelism = 1
        {{- if eq .Values.global.deployed_dial_addon "true" }}
        dialcodeIndexer.parallelism = 1
        dialcodemetricsIndexer.parallelism = 1
        {{- end }}
      }

      schema {
        basePath = "{{ include "common.tplvalues.render" (dict "value" .Values.cloudstorage_read_base_path "context" $) }}/{{ .Values.global.public_container_name }}/schemas/local/content/"
      }

      channel.default = "org.sunbird"
      schema.basePath="https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/schemas/local"

      channel.default = "org.sunbird"

      timezone = "IST"

      job {
          audit-event-generator = true
          audit-history-indexer = true
          obsrv-metadata-generator = true
          composite-search-indexer = true
          dialcode-indexer = {{ eq .Values.global.deployed_dial_addon "true" }}
          dialcode-metrics-indexer = {{ eq .Values.global.deployed_dial_addon "true" }}
      }
      compositesearch.index.name = "compositesearch"
      nested.fields = ["badgeAssertions", "targets", "badgeAssociations", "me_totalTimeSpent", "me_totalPlaySessionCount", "me_totalTimeSpentInSec", "provider", "osMetadata", "actions"]
      schema.definition_cache.expiry = 14400
      restrict {
        metadata.objectTypes = []
        objectTypes = ["EventSet", "Questionnaire", "Misconception", "FrameworkType", "EventSet", "Event"]
      }
      cloudstorage.metadata.replace_absolute_path=true
      cloudstorage.relative_path_prefix="{{ include "common.tplvalues.render" (dict "value" .Values.cloudstorage_relative_path_prefix "context" $) }}"
      cloudstorage.read_base_path="{{ include "common.tplvalues.render" (dict "value" .Values.cloudstorage_read_base_path "context" $) }}"
      cloudstorage.write_base_path={{ include "common.tplvalues.render" (dict "value" .Values.cloudstorage_write_base_path "context" $) }}
      cloudstorage.metadata.list={{ .Values.cloudstorage_metadatalist }}
      cloud_storage_container="{{ .Values.global.public_container_name }}"

    flink-conf: |+
      jobmanager.memory.flink.size: 1024m
      taskmanager.memory.flink.size: 1024m
      taskmanager.numberOfTaskSlots: 1
      jobManager.numberOfTaskSlots: 1
      parallelism.default: 1
      jobmanager.execution.failover-strategy: region
      taskmanager.memory.network.fraction: 0.1
      scheduler-mode: reactive
      heartbeat.timeout: 8000
      heartbeat.interval: 5000
      taskmanager.memory.process.size: 1700m
      jobmanager.memory.process.size: 1600m
      # classloader.resolve-order: "parent-first"
      # state.savepoints.dir: file:///tmp

    job_classname: org.sunbird.job.transaction.task.TransactionEventProcessorStreamTask

  knowlg-publish:
    enabled: true
    serviceMonitor: *serviceMonitor
    config: |+
      include file("/data/flink/conf/base-config.conf")

      job {
        env = "{{ .Values.global.env }}"
      }

      kafka {
        input.topic = "{{ .Values.global.env }}.knowlg.publish.job.request"
        post_publish.topic = "{{ .Values.global.env }}.knowlg.content.postpublish.request"
        mvc.topic = "{{ .Values.global.env }}.knowlg.mvc.processor.job.request"
        qrimage.topic = "{{ .Values.global.env }}.qrimage.request"
        dialcode.context.topic = "{{ .Values.global.env }}.dialcode.context.job.request"
        error.topic = "{{ .Values.global.env }}.knowlg.learning.events.failed"
        groupId = "{{ .Values.global.env }}-knowlg-publish-group"
        content_metadata.topic = "dv.telemetry.coss"
        enriched_metadata.topic = "{{ .Values.global.env }}.knowlg.enriched.content.metadata"
        zookeeper = ""
      }

      enriched {
        metadata {
          enabled = true
          include_hierarchy = false

          global {
            includeFields = [
              "identifier", "name", "status", "mimeType", "primaryCategory",
              "description", "keywords", "author", "creator", "license",
              "visibility", "audience", "language",
              "createdBy"
            ]
            # Auto-include all framework enrichment fields (se_subjects, se_boards, se_mediums, se_gradeLevels, etc.)
            autoIncludeSearchEnrichmentFields = true
          }

          content {
            enabled = true
            includeFields = []
          }

          collection {
            enabled = true
            includeFields = []
            includeHierarchy = false
          }

          question {
            enabled = false
            includeFields = []
          }

          questionset {
            enabled = false
            includeFields = []
            includeHierarchy = false
          }
        }
      }

      task {
        consumer.parallelism = 1
        parallelism = 1
        router.parallelism = 1
      }
    
      question {
        keyspace = "{{ .Values.global.env }}_question_store"
        table = "question_data"
      }

      questionset {
        keyspace = "{{ .Values.global.env }}_hierarchy_store"
        table = "questionset_hierarchy"
      }

      collection_hierarchy {
        keyspace = "{{ .Values.global.env }}_hierarchy_store"
        table = "hierarchy_relations"
      }

      dialcode-cassandra {
        keyspace = "sunbird_dialcodes"
        imageTable = "dialcode_images"
      }

      {{- if eq .Values.global.deployed_dial_addon "true" }}
      service {
        dial.basePath = "https://{{ .Values.global.domain }}/dial"
        dial_code.reserve.url = "/dialcode/v1/reserve"
        dial_code.update.url = "/dialcode/v4/update"
      }

      dialcode.storage.container = "{{ .Values.global.dial_state_container_public }}"
      {{- end }}

      content {
        bundleLocation = "/tmp/contentBundle"
        isECARExtractionEnabled = true
        retry_asset_download_count = 1
        keyspace = "{{ .Values.global.env }}_content_store"
        table = "content_data"
        tmp_file_location = "/tmp"
        objectType = ["Content", "ContentImage","Collection","CollectionImage", "Question", "QuestionImage", "QuestionSet", "QuestionSetImage"]
        mimeType = ["application/pdf",
                                    "application/vnd.ekstep.ecml-archive",
                                    "application/vnd.ekstep.html-archive",
                                    "application/vnd.android.package-archive",
                                    "application/vnd.ekstep.content-archive",
                                    "application/epub",
                                    "application/msword",
                                    "application/vnd.ekstep.h5p-archive",
                                    "video/webm",
                                    "video/mp4",
                                    "application/vnd.ekstep.content-collection",
                                    "video/quicktime",
                                    "application/octet-stream",
                                    "application/json",
                                    "application/javascript",
                                    "application/xml",
                                    "text/plain",
                                    "text/html",
                                    "text/javascript",
                                    "text/xml",
                                    "text/css",
                                    "image/jpeg",
                                    "image/jpg",
                                    "image/png",
                                    "image/tiff",
                                    "image/bmp",
                                    "image/gif",
                                    "image/svg+xml",
                                    "image/x-quicktime",
                                    "video/avi",
                                    "video/mpeg",
                                    "video/quicktime",
                                    "video/3gpp",
                                    "video/mp4",
                                    "video/ogg",
                                    "video/webm",
                                    "video/msvideo",
                                    "video/x-msvideo",
                                    "video/x-qtc",
                                    "video/x-mpeg",
                                    "audio/mp3",
                                    "audio/mp4",
                                    "audio/mpeg",
                                    "audio/ogg",
                                    "audio/webm",
                                    "audio/x-wav",
                                    "audio/wav",
                                    "audio/mpeg3",
                                    "audio/x-mpeg-3",
                                    "audio/vorbis",
                                    "application/x-font-ttf",
                                    "application/vnd.ekstep.plugin-archive",
                                    "video/x-youtube",
                                    "video/youtube",
                                    "text/x-url",
                                    "application/vnd.sunbird.question",
                                    "application/vnd.sunbird.questionset"]
        asset_download_duration = "60 seconds"

        stream {
          enabled = false
          mimeType = ["video/mp4", "video/webm"]
        }
        artifact.size.for_online=209715200

        downloadFiles {
          spine = ["appIcon"]
          full = ["appIcon", "grayScaleAppIcon", "artifactUrl", "itemSetPreviewUrl", "media"]
        }

        nested.fields=["badgeAssertions", "targets", "badgeAssociations", "plugins", "me_totalTimeSpent", "me_totalPlaySessionCount", "me_totalTimeSpentInSec", "batches", "trackable", "credentials", "discussionForum", "provider", "osMetadata", "actions"]

      }

      hierarchy {
        keyspace = "{{ .Values.global.env }}_hierarchy_store"
        table = "content_hierarchy"
      }

      cloud_storage {
          folder {
              content = "content"
              artifact = "artifact"
          }
      }

      contentTypeToPrimaryCategory {
        ClassroomTeachingVideo: "Explanation Content"
        ConceptMap: "Learning Resource"
        Course: "Course"
        CuriosityQuestionSet: "Practice Question Set"
        eTextBook: "eTextbook"
        Event: "Event"
        EventSet: "Event Set"
        ExperientialResource: "Learning Resource"
        ExplanationResource: "Explanation Content"
        ExplanationVideo: "Explanation Content"
        FocusSpot: "Teacher Resource"
        LearningOutcomeDefinition: "Teacher Resource"
        MarkingSchemeRubric: "Teacher Resource"
        PedagogyFlow: "Teacher Resource"
        PracticeQuestionSet: "Practice Question Set"
        PracticeResource: "Practice Question Set"
        SelfAssess: "Course Assessment"
        TeachingMethod: "Teacher Resource"
        TextBook: "Digital Textbook"
        Collection: "Content Playlist"
        ExplanationReadingMaterial: "Learning Resource"
        LearningActivity: "Learning Resource"
        LessonPlan: "Content Playlist"
        LessonPlanResource: "Teacher Resource"
        PreviousBoardExamPapers: "Learning Resource"
        TVLesson: "Explanation Content"
        OnboardingResource: "Learning Resource"
        ReadingMaterial: "Learning Resource"
        Template: "Template"
        Asset: "Asset"
        Plugin: "Plugin"
        LessonPlanUnit: "Lesson Plan Unit"
        CourseUnit: "Course Unit"
        TextBookUnit: "Textbook Unit"
        Asset: "Certificate Template"
      }

      max_allowed_content_name = 120
      {{- if eq .Values.global.deployed_dial_addon "true" }}
      enableDIALContextUpdate = "Yes"
      {{- end }}

      cloudstorage.metadata.replace_absolute_path=true
      cloudstorage.relative_path_prefix="{{ include "common.tplvalues.render" (dict "value" .Values.cloudstorage_relative_path_prefix "context" $) }}"
      cloudstorage.read_base_path="{{ include "common.tplvalues.render" (dict "value" .Values.cloudstorage_read_base_path "context" $) }}"
      cloudstorage.write_base_path={{ include "common.tplvalues.render" (dict "value" .Values.cloudstorage_write_base_path "context" $) }}
      cloudstorage.metadata.list={{ .Values.cloudstorage_metadatalist }}

      cloud_storage_type="{{ .Values.global.sunbird_cloud_storage_provider }}"
      cloud_storage_key="{{ .Values.global.cloud_storage_access_key }}"
      {{- if eq .Values.global.cloud_storage_provider "azure" }}
      cloud_storage_secret=""
      cloud_storage_auth_type="{{ .Values.global.cloud_storage_auth_type }}"
      {{- else }}
      cloud_storage_secret="{{ .Values.global.cloud_storage_secret_key }}"
      {{- end }}
      cloud_storage_container="{{ .Values.global.public_container_name }}"
      cloud_storage_endpoint=""
      schema {
        basePath="https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/schemas/local"
        supportedVersion = {
          itemset = "2.0"
        }
      }
      ai_search_enabled = true

    flink-conf: |+
      jobmanager.memory.flink.size: 1024m
      taskmanager.memory.flink.size: 2048m
      taskmanager.numberOfTaskSlots: 1
      jobManager.numberOfTaskSlots: 1
      parallelism.default: 1
      jobmanager.execution.failover-strategy: region
      taskmanager.memory.network.fraction: 0.1
      scheduler-mode: reactive
      heartbeat.timeout: 8000
      heartbeat.interval: 5000
      taskmanager.memory.process.size: 2800m
      jobmanager.memory.process.size: 1600m
      # classloader.resolve-order: "parent-first"
      # state.savepoints.dir: file:///tmp
    job_classname: org.sunbird.job.knowlg.task.KnowlgPublishStreamTask

  content-embedding:
    enabled: true
    serviceMonitor: *serviceMonitor
    config: |+
      include file("/data/flink/conf/base-config.conf")

      job {
        env = "{{ .Values.global.env }}"
      }

      kafka {
        input.topic = "{{ .Values.global.env }}.knowlg.enriched.content.metadata"
        output.topic = "{{ .Values.global.env }}.knowlg.embedding.chunks"
        error.topic = "{{ .Values.global.env }}.knowlg.learning.events.failed"
        groupId = "{{ .Values.global.env }}-content-embedding-group"
      }

      task {
        consumer.parallelism = 1
        extract.parallelism = 2
        chunking.parallelism = 2
        embedding.parallelism = 2
        quantization.parallelism = 2
        sink.parallelism = 1
      }

      schema {
        # Events with _schema_version outside this list are routed to the DLQ.
        supported_versions = ["1.0"]
      }

      chunking {
        strategy = "sliding-window"

        semantic {
          max_chunk_size = 1000
          excluded_fields = [
            "hierarchy",
            "children",
            "id",
            "identifier",
            "contentType",
            "_schema_version",
            "timestamp"
          ]
        }

        sliding-window {
          max_words    = 512
          overlap_words = 102
        }
      }

      embedding {
        service = "openai"
        batch_size = 32
        # Warn + counter when an embed API call exceeds this many millis.
        slow_call_threshold_ms = 5000

        openai {
          api_key = ""
          api_key = ${?OPENAI_API_KEY}
          model = "text-embedding-3-small"
          dimensions = 1536
          timeout = 30
          azure_endpoint = "{{ .Values.global.openai_azure_endpoint | default "" }}"
          azure_deployment = "{{ .Values.global.openai_azure_deployment | default "text-embedding-3-small" }}"
          azure_api_version = "{{ .Values.global.openai_azure_api_version | default "2023-05-15" }}"
        }
      }

      quantization {
        strategy = "int8"
      }

      opensearch {
        host = "{{ .Values.global.opensearch.host }}"
        port = {{ .Values.global.opensearch.port }}
        index.name = "compositesearch"
        user = ""
        password = ""
      }

    flink-conf: |+
      jobmanager.memory.flink.size: 1024m
      taskmanager.memory.flink.size: 2048m
      taskmanager.numberOfTaskSlots: 1
      jobManager.numberOfTaskSlots: 1
      parallelism.default: 1
      jobmanager.execution.failover-strategy: region
      taskmanager.memory.network.fraction: 0.1
      scheduler-mode: reactive
      heartbeat.timeout: 8000
      heartbeat.interval: 5000
      taskmanager.memory.process.size: 2800m
      jobmanager.memory.process.size: 1600m

    job_classname: org.sunbird.job.contentembedding.task.ContentEmbeddingStreamTask

    extraEnv:
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: openai-secret
            key: OPENAI_API_KEY
            optional: true

commonAnnotations:
  reloader.stakater.com/auto: "true"