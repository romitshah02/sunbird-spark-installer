# This is the main configuration file for the application.
# https://www.playframework.com/documentation/latest/ConfigFile
# ~~~~~
# Play uses HOCON as its configuration file format.  HOCON has a number
# of advantages over other config formats, but there are two things that
# can be used when modifying settings.
#
# You can include other configuration files in this main application.conf file:
#include "extra-config.conf"
#
# You can declare variables and substitute for them:
#mykey = ${some.value}
#
# And if an environment variable exists when there is no other substitution, then
# HOCON will fall back to substituting environment variable:
#mykey = ${JAVA_HOME}

## Pekko
# https://www.playframework.com/documentation/latest/ScalaPekko#Configuration
# https://www.playframework.com/documentation/latest/JavaPekko#Configuration# ~~~~~
# Play uses pekko internally and exposes pekko Streams and actors in Websockets and
# other streaming HTTP responses.
pekko {
  # "pekko.log-config-on-start" is extraordinarly useful because it log the complete
  # configuration at INFO level, including defaults and overrides, so it s worth
  # putting at the very top.
  #
  # Put the following in your conf/logback.xml file:
  #
  # <logger name="pekko.actor" level="INFO" />
  #
  # And then uncomment this line to debug the configuration.
  #
  #log-config-on-start = true
  default-dispatcher {
    # This will be used if you have set "executor = "fork-join-executor""
    fork-join-executor {
      # Min number of threads to cap factor-based parallelism number to
      parallelism-min = 8
      # The parallelism factor is used to determine thread pool size using the
      # following formula: ceil(available processors * factor). Resulting size
      # is then bounded by the parallelism-min and parallelism-max values.
      parallelism-factor = 32.0
      # Max number of threads to cap factor-based parallelism number to
      parallelism-max = 64
      # Setting to "FIFO" to use queue like peeking mode which "poll" or "LIFO" to use stack
      # like peeking mode which "pop".
      task-peeking-mode = "FIFO"
    }
  }
  actors-dispatcher {
    type = "Dispatcher"
    executor = "fork-join-executor"
    fork-join-executor {
      parallelism-min = 8
      parallelism-factor = 32.0
      parallelism-max = 64
    }
    # Throughput for default Dispatcher, set to 1 for as fair as possible
    throughput = 1
  }
  actor {
    deployment {
      /user/searchActor
        {
          router = smallest-mailbox-pool
          nr-of-instances = 10
          dispatcher = actors-dispatcher
        }
      /user/healthActor
        {
          router = smallest-mailbox-pool
          nr-of-instances = 10
          dispatcher = actors-dispatcher
        }
    }
  }
}

## Secret key
# http://www.playframework.com/documentation/latest/ApplicationSecret
# ~~~~~
# The secret key is used to sign Play's session cookie.
# This must be changed for production, but we don't recommend you change it in this file.
play.http.secret.key = "{{ .Values.global.play_http.secret_key }}"

## Modules
# https://www.playframework.com/documentation/latest/Modules
# ~~~~~
# Control which modules are loaded when Play starts.  Note that modules are
# the replacement for "GlobalSettings", which are deprecated in 2.5.x.
# Please see https://www.playframework.com/documentation/latest/GlobalSettings
# for more information.
#
# You can also extend Play functionality by using one of the publically available
# Play modules: https://playframework.com/documentation/latest/ModuleDirectory
play.modules {
  # By default, Play will load any class called Module that is defined
  # in the root package (the "app" directory), or you can define them
  # explicitly below.
  # If there are any built-in modules that you want to enable, you can list them here.
  #enabled += my.application.Module

  # If there are any built-in modules that you want to disable, you can list them here.
  #disabled += ""
  enabled += modules.SearchModule
}

## IDE
# https://www.playframework.com/documentation/latest/IDE
# ~~~~~
# Depending on your IDE, you can add a hyperlink for errors that will jump you
# directly to the code location in the IDE in dev mode. The following line makes
# use of the IntelliJ IDEA REST interface:
#play.editor="http://localhost:63342/api/file/?file=%s&line=%s"

## Internationalisation
# https://www.playframework.com/documentation/latest/JavaI18N
# https://www.playframework.com/documentation/latest/ScalaI18N
# ~~~~~
# Play comes with its own i18n settings, which allow the user's preferred language
# to map through to internal messages, or allow the language to be stored in a cookie.
play.i18n {
  # The application languages
  langs = [ "en" ]

  # Whether the language cookie should be secure or not
  #langCookieSecure = true

  # Whether the HTTP only attribute of the cookie should be set to true
  #langCookieHttpOnly = true
}

## Play HTTP settings
# ~~~~~
play.http {
  ## Router
  # https://www.playframework.com/documentation/latest/JavaRouting
  # https://www.playframework.com/documentation/latest/ScalaRouting
  # ~~~~~
  # Define the Router object to use for this application.
  # This router will be looked up first when the application is starting up,
  # so make sure this is the entry point.
  # Furthermore, it's assumed your route file is named properly.
  # So for an application router like `my.application.Router`,
  # you may need to define a router file `conf/my.application.routes`.
  # Default to Routes in the root package (aka "apps" folder) (and conf/routes)
  #router = my.application.Router

  ## Action Creator
  # https://www.playframework.com/documentation/latest/JavaActionCreator
  # ~~~~~
  #actionCreator = null

  ## ErrorHandler
  # https://www.playframework.com/documentation/latest/JavaRouting
  # https://www.playframework.com/documentation/latest/ScalaRouting
  # ~~~~~
  # If null, will attempt to load a class called ErrorHandler in the root package,
  #errorHandler = null

  ## Session & Flash
  # https://www.playframework.com/documentation/latest/JavaSessionFlash
  # https://www.playframework.com/documentation/latest/ScalaSessionFlash
  # ~~~~~
  session {
    # Sets the cookie to be sent only over HTTPS.
    #secure = true

    # Sets the cookie to be accessed only by the server.
    #httpOnly = true

    # Sets the max-age field of the cookie to 5 minutes.
    # NOTE: this only sets when the browser will discard the cookie. Play will consider any
    # cookie value with a valid signature to be a valid session forever. To implement a server side session timeout,
    # you need to put a timestamp in the session and check it at regular intervals to possibly expire it.
    #maxAge = 300

    # Sets the domain on the session cookie.
    #domain = "example.com"
  }

  flash {
    # Sets the cookie to be sent only over HTTPS.
    #secure = true

    # Sets the cookie to be accessed only by the server.
    #httpOnly = true
  }
}

play.http.parser.maxDiskBuffer = 10MB
parsers.anyContent.maxLength = 10MB

play.server.provider = play.core.server.PekkoHttpServerProvider

## Netty Provider
# https://www.playframework.com/documentation/latest/SettingsNetty
# ~~~~~
play.server.netty {
  # Whether the Netty wire should be logged
  log.wire = true

  # If you run Play on Linux, you can use Netty's native socket transport
  # for higher performance with less garbage.
  transport = "jdk"
}

## WS (HTTP Client)
# https://www.playframework.com/documentation/latest/ScalaWS#Configuring-WS
# ~~~~~
# The HTTP client primarily used for REST APIs.  The default client can be
# configured directly, but you can also create different client instances
# with customized settings. You must enable this by adding to build.sbt:
#
# libraryDependencies += ws // or javaWs if using java
#
play.ws {
  # Sets HTTP requests not to follow 302 requests
  #followRedirects = false

  # Sets the maximum number of open HTTP connections for the client.
  #ahc.maxConnectionsTotal = 50

  ## WS SSL
  # https://www.playframework.com/documentation/latest/WsSSL
  # ~~~~~
  ssl {
    # Configuring HTTPS with Play WS does not require programming.  You can
    # set up both trustManager and keyManager for mutual authentication, and
    # turn on JSSE debugging in development with a reload.
    #debug.handshake = true
    #trustManager = {
    #  stores = [
    #    { type = "JKS", path = "exampletrust.jks" }
    #  ]
    #}
  }
}

## Cache
# https://www.playframework.com/documentation/latest/JavaCache
# https://www.playframework.com/documentation/latest/ScalaCache
# ~~~~~
# Play comes with an integrated cache API that can reduce the operational
# overhead of repeated requests. You must enable this by adding to build.sbt:
#
# libraryDependencies += cache
#
play.cache {
  # If you want to bind several caches, you can bind the individually
  #bindCaches = ["db-cache", "user-cache", "session-cache"]
}

## Filter Configuration
# https://www.playframework.com/documentation/latest/Filters
# ~~~~~
# There are a number of built-in filters that can be enabled and configured
# to give Play greater security.
#
play.filters {
  # Enable Play's SecurityHeadersFilter (adds security response headers) alongside the access log filter
  enabled = [play.filters.headers.SecurityHeadersFilter, filters.AccessLogFilter]
  cors {
  }
  headers {
    # X-Frame-Options: DENY -> page cannot be embedded in a frame/iframe (prevents clickjacking)
    frameOptions = "DENY"
    # X-XSS-Protection header omitted (deprecated, ignored by modern browsers)
    xssProtection = null
    # X-Content-Type-Options: nosniff -> browser must not MIME-sniff responses
    contentTypeOptions = "nosniff"
    # X-Permitted-Cross-Domain-Policies header omitted
    permittedCrossDomainPolicies = null
    # Content-Security-Policy header omitted (avoids breaking app with restrictive default)
    contentSecurityPolicy = null
  }
  hosts {
  }
}

play.http.parser.maxMemoryBuffer = 50MB
pekko.http.parsing.max-content-length = 50MB
{{ if eq .Values.global.cloud_storage_provider "gcp" }}
schema.base_path= "/home/sunbird/search-service-1.0-SNAPSHOT/schemas"
{{ else }} 
schema.base_path= "{{ include "common.tplvalues.render" (dict "value" .Values.global.schema.base_path "context" $) }}"
{{ end }}

telemetry_env={{ .Values.search.telemetry_env }}
installation.id={{ .Values.global.installation.id }}

# ElasticSearch Configuration
ekstepPlatformApiUserId="{{ .Values.search.ekstepPlatformApiUserId }}"
search.es_conn_info="{{ .Values.global.opensearch.host }}:{{ .Values.global.opensearch.port }}"
search.fields.query={{ .Values.search.fields_query}}
search.fields.date= {{ .Values.search.fields_date }}
search.batch.size={{ .Values.search.batch_size }}
search.connection.timeout={{ .Values.search.connection_timeout }}
search.fields.mode_collection={{ .Values.search.fields_mode_collection }}

language.map={
{{- range $key, $value := .Values.search.language.map }}
  "{{ $key }}": "{{ $value }}",
{{- end }}
}
# Configuration for default channel ID
channel.default="{{ .Values.global.channel.default }}"
compositesearch.index.name="{{ .Values.search.compositesearch_index_name }}"

content.tagging.backward_enable={{ .Values.search.content_tagging_backward_enable }}
content.tagging.property={{ .Values.search.content_tagging_property }}
search.payload.log_enable={{ .Values.search.search_payload_log_enable }}

# Semantic search. Embedding service config must match the content-embedding
# Flink job, otherwise query-time and index-time vectors won't share a space.
semantic_search {
  enabled = {{ .Values.search.semantic.enabled | default "false" }}

  embedding_service = "{{ .Values.search.semantic.embedding_service | default "openai" }}"

  openai {
    api_key = ""
    api_key = ${?OPENAI_API_KEY}
    model = "{{ .Values.search.semantic.openai.model | default "text-embedding-3-small" }}"
    dimensions = {{ .Values.search.semantic.openai.dimensions | default 1536 }}
    timeout = {{ .Values.search.semantic.openai.timeout | default 5 }}
    azure_endpoint = "{{ .Values.global.openai_azure_endpoint | default .Values.search.semantic.openai.azure_endpoint | default "" }}"
    azure_deployment = "{{ .Values.global.openai_azure_deployment | default .Values.search.semantic.openai.azure_deployment | default "text-embedding-3-small" }}"
    azure_api_version = "{{ .Values.global.openai_azure_api_version | default .Values.search.semantic.openai.azure_api_version | default "2023-05-15" }}"
  }

  e5 {
    host = "{{ .Values.search.semantic.e5.host | default "localhost" }}"
    port = {{ .Values.search.semantic.e5.port | default 80 }}
    dimensions = {{ .Values.search.semantic.e5.dimensions | default 768 }}
    timeout = {{ .Values.search.semantic.e5.timeout | default 5 }}
  }

  quantization_strategy = "{{ .Values.search.semantic.quantization_strategy | default "int8" }}"

  vector_field = "{{ .Values.search.semantic.vector_field | default "chunks.embedding" }}"
  vector_path  = "{{ .Values.search.semantic.vector_path  | default "chunks" }}"

  default_k = {{ .Values.search.semantic.default_k | default 50 }}
  max_k     = {{ .Values.search.semantic.max_k | default 500 }}
  min_score = {{ .Values.search.semantic.min_score | default 0.75 }}

  schema_versions = {{ .Values.search.semantic.schema_versions | default "[\"1.0\"]" }}

  rrf_k = {{ .Values.search.semantic.rrf_k | default 60 }}

  embedding_pool_size = {{ .Values.search.semantic.embedding_pool_size | default 8 }}

  embedding_cache {
    enabled     = {{ .Values.search.semantic.embedding_cache.enabled | default "true" }}
    size        = {{ .Values.search.semantic.embedding_cache.size | default 1024 }}
    ttl_seconds = {{ .Values.search.semantic.embedding_cache.ttl_seconds | default 300 }}
  }
}

