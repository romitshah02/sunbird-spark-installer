## Pekko
# https://www.playframework.com/documentation/latest/ScalaPekko#Configuration
# https://www.playframework.com/documentation/latest/JavaPekko#Configuration# ~~~~~
# Play uses pekko internally and exposes pekko Streams and actors in Websockets and
# other streaming HTTP responses.
pekko {
  default-dispatcher {
    fork-join-executor {
      parallelism-min = 8
      parallelism-factor = 32.0
      parallelism-max = 64
      task-peeking-mode = "FIFO"
    }
  }
  actors-dispatcher {
    type = "Dispatcher"
    executor = "fork-join-executor"
    fork-join-executor {
      parallelism-min = 8
      parallelism-factor = 32.0
      parallelism-max = 64
    }
    throughput = 1
  }
    actor {
        deployment {
        /user/contentActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/channelActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/collectionActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/collectionCSVActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/healthActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 5
            dispatcher = actors-dispatcher
        }
        /user/licenseActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 2
            dispatcher = actors-dispatcher
        }
        /user/assetActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/objectCategoryActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/objectCategoryDefinitionActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/frameworkActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/categoryInstanceActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/termActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/lockActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 10
            dispatcher = actors-dispatcher
        }
        /user/assessmentItemActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 2
            dispatcher = actors-dispatcher
        }
        /user/itemSetActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 2
            dispatcher = actors-dispatcher
        }
        /user/questionActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 5
            dispatcher = actors-dispatcher
        }
        /user/questionSetActor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 5
            dispatcher = actors-dispatcher
        }
        /user/questionV5Actor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 5
            dispatcher = actors-dispatcher
        }
        /user/questionSetV5Actor
        {
            router = smallest-mailbox-pool
            nr-of-instances = 5
            dispatcher = actors-dispatcher
        }
        }
    }
}

