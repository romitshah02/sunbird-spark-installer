assessmentitem.table="question_data"

import {
    request_size_limit : 300
    output_topic_name : "{{ include "common.tplvalues.render" (dict "value" .Values.inquiry.assessment.import_kafka_topic "context" $) }}"
    required_props {
    question : {{ .Values.inquiry.required_props }}
    questionset : {{ .Values.inquiry.required_props }}
    }
}


root_node_visibility=["Default","Private"]
assessment.copy.origin_data= {{ .Values.inquiry.assessment.copy_origin_data }}
assessment.copy.props_to_remove= {{ .Values.inquiry.assessment.copy_props_to_remove }}

v5_supported_qumlVersions={{ include "common.tplvalues.render" (dict "value" .Values.inquiry.v5_supported_qumlVersions "context" $) }}
v5_default_qumlVersion="{{ .Values.inquiry.v5_default_qumlVersion }}"

# Assessment Configuration
assessment.skip.validation={{ .Values.inquiry.assessment_skip_validation }}
assessment.default.framework="{{ .Values.inquiry.assessment_default_framework }}"
assessment.item.mime_type="{{ .Values.inquiry.assessment_item_mime_type }}"
assessment.media.resolution="{{ .Values.inquiry.assessment_media_resolution }}"

hierarchy.relation.keyspace = "{{ .Values.global.env }}_hierarchy_store"
hierarchy.relation.table = "hierarchy_relations"

# HTML Sanitizer Settings
html.sanitizer.max.depth=25