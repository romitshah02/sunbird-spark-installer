fullname: kbb

knowlg_automation_repo_branch: main

channel: &channel
  default: "in.ekstep"

knowlg:
  enabled: true
  opa_enabled: true

provisioningAnnotations: &provisioningAnnotations
  "helm.sh/hook-weight": "-4"

migration:
  yugabyte:
    waitTime: 120

elasticsearch: &es
  enabled: true
  fullnameOverride: "elasticsearch"
  host: "elasticsearch"
  port: 9200
  image:
    registry: docker.io
    repository: bitnami/elasticsearch
    tag: 7.10.2
  master:
    masterOnly: false
    replicaCount: 1
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    heapSize: 2G
    persistence:
      size: 25Gi
  data:
    replicaCount: 0
  coordinating:
    replicaCount: 0
  ingest:
    enabled: false
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations
  sysctlImage:
    registry: sunbirded.azurecr.io
    repository: bitnami-shell-archived
    tag: 11-debian-11-r54

graph_passport: &graph_passport
  key_base: "secretKey"

installation: &installation
  id: ekstep

janusgraph: &janusgraph
  enabled: true
  fullnameOverride: "janusgraph"
  nameOverride: "janusgraph"
  host: "janusgraph"
  port: 8182
  image:
    registry: docker.io
    repository: bitnamilegacy/janusgraph
    tag: 1.1.0-debian-12-r21
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations 

kafka: &kafka
  enabled: true
  nameOverride: "kafka"
  fullnameOverride: "kafka"
  clientProtocol: PLAINTEXT
  host: "kafka"
  port: 9092
  image:
    registry: sunbirded.azurecr.io
    repository: kafka
    tag: 3.3.1-debian-11-r25
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi
  provisioning:
    annotations: *provisioningAnnotations
    replicationFactor: 1
    numPartitions: 1
    topics:
    - name: "{{ .Values.global.env }}.knowlg.publish.job.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.content.postpublish.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.learning.job.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.learning.graph.events"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.learning.events.failed"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.telemetry.raw"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.auto.creation.job.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.transaction.meta"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.qrimage.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.system.events"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.dialcode.context.job.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.dialcode.context.job.request.failed"
      partitions: 1
      replicationFactor: 1
    parallel: 1
  listeners:
    client:
      protocol: PLAINTEXT
  controller:
      protocol: PLAINTEXT
  interbroker:
      protocol: PLAINTEXT
  external:
      protocol: PLAINTEXT
  sasl:
    enabledMechanisms: ""
    interBrokerMechanism: ""
    controllerMechanism: ""
  tls:
    autoGenerated:
      enabled: false
    existingSecret: ""

objectcategorydefinition: &objectcategorydefinition
  keyspace: "{{ .Values.global.env }}_category_store"

# play_http: &play_http
#   secret_key: "secretKey"

redis: &redis
  enabled: true
  nameOverride: "redis"
  fullnameOverride: "redis"
  auth:
    enabled: false
  host: "redis-master"
  port: 6379
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  replica:
    replicaCount: 0
  master:
    persistence:
      size: 25Gi

schema: &schema
  base_path: "https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/schemas/local"

yugabyte: &yugabyte
  enabled: true
  nameOverride: "yugabyte"
  fullnameOverride: "yugabyte"
  host: "yb-tserver-service" 
  port: 9042
  postgresql_port: 5433
  image:
    registry: yugabytedb
    repository: yugabyte
    tag: 2025.2.0.0-b131 
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations
  # Force single replica for Yugabyte masters and tservers (override subchart defaults)
  replicas:
    master: 3
    tserver: 3   
  username: yugabyte
  password: "yugabyte"    

yugabytecql:
  image:
    repository: "ghcr.io/sunbird-spark/sunbird-yugabyte-migrations"
    tag: "develop_499032f"

dialservice: &dialservice
  base_url: "http://dial-service:9000"

search:
  enabled: true

flink:
  enabled: true

global:
  channel: *channel
  elasticsearch: *es
  graph_passport: *graph_passport
  installation: *installation
  janusgraph: *janusgraph
  kafka: *kafka
  keycloak_kid_keys_configmap: keycloak-kids-keys
  kong_desktop_device_consumer_names_for_opa: '["portal", "desktop"]'
  objectcategorydefinition: *objectcategorydefinition
  # play_http: *play_http
  provisioningAnnotations: *provisioningAnnotations
  redis: *redis
  schema: *schema
  yugabyte: *yugabyte
  dialservice: *dialservice