fullname: kbb
knowlg_automation_repo_branch: main

provisioningAnnotations: &provisioningAnnotations
  "helm.sh/hook-weight": "-4"

neo4j: &neo4j
  enabled: true
  host: "neo4j"
  port: 7687
  boltPort: 8687
  image:
    repository: sunbirded.azurecr.io/neo4j
    tag: "3.3.0"
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations
    waitForNeo4j: "true"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

elasticsearch: &es
  enabled: true
  fullnameOverride: "elasticsearch"
  host: "elasticsearch"
  port: 9200
  image:
    registry: docker.io
    repository: bitnami/elasticsearch
    tag: 7.10.2
  master:
    masterOnly: false
    replicaCount: 1
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    heapSize: 2G
    persistence:
      size: 25Gi
  data:
    replicaCount: 0
  coordinating:
    replicaCount: 0
  ingest:
    enabled: false
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations
  sysctlImage:
    registry: sunbirded.azurecr.io
    repository: bitnami-shell-archived
    tag: 11-debian-11-r54

redis: &redis
  enabled: true
  nameOverride: "redis"
  fullnameOverride: "redis"
  auth:
    enabled: false
  host: "redis-master"
  port: 6379
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  replica:
    replicaCount: 0
  master:
    persistence:
      size: 25Gi

yugabyte: &yugabyte
  enabled: true
  nameOverride: "yugabyte"
  fullnameOverride: "yugabyte"
  host: "yb-tserver-service" 
  port: 9042
  postgresql_port: 5433
  image:
    registry: yugabytedb
    repository: yugabyte
    tag: 2025.2.0.0-b131 
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations
  persistence:
    size: 25Gi  
  # Force single replica for Yugabyte masters and tservers (override subchart defaults)
  replicas:
    master: 3
    tserver: 3   
  username: yugabyte
  password: "yugabyte"    

kafka: &kafka
  enabled: true
  nameOverride: "kafka"
  fullnameOverride: "kafka"
  clientProtocol: PLAINTEXT
  host: "kafka"
  port: 9092
  image:
    registry: sunbirded.azurecr.io
    repository: kafka
    tag: 3.3.1-debian-11-r25
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi
  provisioning:
    annotations: *provisioningAnnotations
    replicationFactor: 1
    numPartitions: 1
    topics:
    - name: "{{ .Values.global.env }}.knowlg.qrimage.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.publish.job.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.content.postpublish.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.learning.job.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.learning.graph.events"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.learning.events.failed"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.qrimage.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.telemetry.raw"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.dialcode.context.job.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.dialcode.context.job.request.failed"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.auto.creation.job.request"
      partitions: 1
      replicationFactor: 1
    - name: "{{ .Values.global.env }}.knowlg.transaction.meta"
      partitions: 1
      replicationFactor: 1
    parallel: 1
  listeners:
    client:
      protocol: PLAINTEXT
  controller:
      protocol: PLAINTEXT
  interbroker:
      protocol: PLAINTEXT
  external:
      protocol: PLAINTEXT
  sasl:
    enabledMechanisms: ""
    interBrokerMechanism: ""
    controllerMechanism: ""
  tls:
    autoGenerated:
      enabled: false
    existingSecret: ""

# play_http: &play_http
#   secret_key: "secretKey"
schema: &schema
  base_path: "https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/schemas/local"
graph_passport: &graph_passport
  key_base: "secretKey"
installation: &installation
  id: ekstep
channel: &channel
  default: "in.ekstep"
objectcategorydefinition: &objectcategorydefinition
  keyspace: "{{ .Values.global.env }}_category_store"

global:
  redis: *redis
  elasticsearch: *es
  neo4j: *neo4j
  yugabyte: *yugabyte
  kafka: *kafka
  # play_http: *play_http
  schema: *schema
  graph_passport: *graph_passport
  installation: *installation
  channel: *channel
  objectcategorydefinition: *objectcategorydefinition
  provisioningAnnotations: *provisioningAnnotations
  keycloak_kid_keys_configmap: keycloak-kids-keys
  kong_desktop_device_consumer_names_for_opa: '["portal", "desktop"]'

content:
  opa_enabled: true

migration:
  yugabyte:
    waitTime: 120
