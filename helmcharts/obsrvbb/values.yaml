replicaCount: 1
fullname: obsrvbb
env: &env
default: "dev"

provisioningAnnotations: &provisioningAnnotations
  "helm.sh/hook-weight": "-4"

kafka: &kafka
  enabled: true
  nameOverride: "kafka"
  fullnameOverride: "kafka"
  clientProtocol: PLAINTEXT
  host: "kafka"
  port: 9092
  image:
    registry: sunbirded.azurecr.io
    repository: kafka
    tag: 3.3.1-debian-11-r25
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  persistence:
    size: 25Gi
  provisioning:
    nameOverride: "provisioning"
    fullnameOverride: "provisioning"
    annotations: *provisioningAnnotations
    replicationFactor: 1
    numPartitions: 1
    topics:
    - name: "{{ .Values.global.env }}.nlweb.ingest"
    - name: "{{ .Values.global.env }}.telemetry.ingest"
    parallel: 1
  listeners:
    client:
      protocol: PLAINTEXT
  controller:
      protocol: PLAINTEXT
  interbroker:
      protocol: PLAINTEXT
  external:
      protocol: PLAINTEXT
  sasl:
    enabledMechanisms: ""
    interBrokerMechanism: ""
    controllerMechanism: ""
  tls:
    autoGenerated:
      enabled: false
    existingSecret: ""

superset:
  enabled: true

yugabyte: &yugabyte
  enabled: true
  nameOverride: "yugabyte"
  fullnameOverride: "yugabyte"
  host: "yb-tserver-service" 
  port: 9042
  postgresql_port: 5433
  databases:
    - name: "superset"
  image:
    registry: yugabytedb
    repository: yugabyte
    tag: 2025.2.0.0-b131 
  commonAnnotations:
    "helm.sh/hook-weight": "-5"
  provisioning:
    annotations: *provisioningAnnotations  
  persistence:
    size: 25Gi  
  # Force single replica for Yugabyte masters and tservers (override subchart defaults)
  replicas:
    master: 3
    tserver: 3
  username: yugabyte  
  password: yugabyte

global:
  kafka: *kafka
  yugabyte: *yugabyte
